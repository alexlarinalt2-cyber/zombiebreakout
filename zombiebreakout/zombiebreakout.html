// Preloaded action icons -- process on offscreen canvas to remove dark background
const IMG_FIST=new Image();
const IMG_GRENADE=new Image();
function removeDarkBg(img){
  let oc=document.createElement('canvas');oc.width=img.width;oc.height=img.height;
  let ox=oc.getContext('2d');ox.drawImage(img,0,0);
  let d=ox.getImageData(0,0,oc.width,oc.height),px=d.data;
  for(let i=0;i<px.length;i+=4){
    let r=px[i],g=px[i+1],b=px[i+2];
    let brightness=(r+g+b)/3;
    if(brightness<60)px[i+3]=0; // make dark pixels transparent
    else if(brightness<120)px[i+3]=Math.round(((brightness-60)/60)*255); // fade mid-darks
  }
  ox.putImageData(d,0,0);
  let out=new Image();out.src=oc.toDataURL();return out;
}

function eWalls(b){
  let d0=b.doorX,d1=b.doorX+b.doorW;
  return[{x:b.x,y:b.y,w:b.w,h:WT},{x:b.x,y:b.y+WT,w:WT,h:b.h-WT*2},
    {x:b.x+b.w-WT,y:b.y+WT,w:WT,h:b.h-WT*2},
    {x:b.x,y:b.y+b.h-WT,w:Math.max(0,d0-b.x),h:WT},
    {x:d1,y:b.y+b.h-WT,w:Math.max(0,b.x+b.w-d1),h:WT}];
}

function snd(pts,wave,dur,vol=0.4){
  if(!audioCtx)return;if(audioCtx.state==='suspended')audioCtx.resume();
  try{
    let o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.connect(g);g.connect(audioCtx.destination);o.type=wave;let now=audioCtx.currentTime;
    pts.forEach((p,i)=>{
      if(i===0){o.frequency.setValueAtTime(p[0],now);g.gain.setValueAtTime(p[1]*vol,now);}
      else{o.frequency.linearRampToValueAtTime(p[0],now+p[2]);g.gain.linearRampToValueAtTime(p[1]*vol,now+p[2]);}
    });
    o.start(now);o.stop(now+dur);
  }catch(e){}
}

// -- Helpers ---------------------------------------------------
function ppk(){let t=PD.reduce((a,p)=>a+p.w,0),r=Math.random()*t,a=0;for(let p of PD){a+=p.w;if(r<a)return p;}return PD[0];}
function dst(a,b){return Math.hypot(a[0]-b[0],a[1]-b[1]);}
function nrm(dx,dy){let d=Math.hypot(dx,dy);return d?[dx/d,dy/d]:[0,0];}
function scx(wx){return wx-cam.x;}function scy(wy){return wy-cam.y;}
function wmx(){return ms.x+cam.x;}function wmy(){return ms.y+cam.y;}
function updCam(){cam.x=Math.max(0,Math.min(WW-W,pl.x-W/2));cam.y=Math.max(0,Math.min(WH-H,pl.y-H/2));}
function addShake(p){shakePow=Math.max(shakePow,p);}
function addDecal(x,y,r=18,col='#5a0000'){
  if(decals.length>180)decals.splice(0,decals.length-180); // hard cap
  for(let i=0;i<5;i++){let a=Math.random()*Math.PI*2;decals.push({x:x+Math.cos(a)*Math.random()*r,y:y+Math.sin(a)*Math.random()*r,r:r*0.6,l:1,col});}
}
function addDmgNum(x,y,val,col='#ffffff'){dmgNums.push({x,y,val,l:1,vy:-1.4,col});}
function addDmgDir(fromX,fromY){dmgDirs.push({ang:Math.atan2(fromY-pl.y,fromX-pl.x),l:1});}
function hc(h,mx){let p=h/mx;return p>0.6?'#28dc3c':p>0.3?'#ffa014':'#f02828';}
function rrx(x,y,w,h,r,f,s,lw=1){
  X.beginPath();if(X.roundRect)X.roundRect(x,y,w,h,r);else X.rect(x,y,w,h);
  if(f){X.fillStyle=f;X.fill();}if(s){X.strokeStyle=s;X.lineWidth=lw;X.stroke();}
}

function pnl(x,y,w,h,r,topCol,botCol,border,lw){
  rrx(x+3,y+6,w,h,r,'rgba(0,0,0,0.5)');
  let g=X.createLinearGradient(0,y,0,y+h);
  g.addColorStop(0,topCol);g.addColorStop(1,botCol);
  rrx(x,y,w,h,r,g,border,lw||1);
  X.save();X.globalAlpha=0.35;X.strokeStyle='rgba(255,255,255,0.55)';X.lineWidth=1;
  X.beginPath();X.moveTo(x+r+4,y+1.5);X.lineTo(x+w-r-4,y+1.5);X.stroke();X.restore();
}

// -- Collision -------------------------------------------------
function crCol(cx,cy,r,rx,ry,rw,rh){
  if(rw<=0||rh<=0)return false;
  let nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  return Math.hypot(cx-nx,cy-ny)<r;
}
function resCR(cx,cy,r,rx,ry,rw,rh){
  if(!crCol(cx,cy,r,rx,ry,rw,rh))return null;
  let nx=Math.max(rx,Math.min(cx,rx+rw)),ny=Math.max(ry,Math.min(cy,ry+rh));
  let ddx=cx-nx,ddy=cy-ny,d=Math.hypot(ddx,ddy);
  if(d>0)return[cx+ddx/d*(r-d+1),cy+ddy/d*(r-d+1)];
  let dl=cx-rx,dr=rx+rw-cx,dt=cy-ry,db=ry+rh-cy,m=Math.min(dl,dr,dt,db);
  if(m===dl)return[rx-r-1,cy];if(m===dr)return[rx+rw+r+1,cy];
  if(m===dt)return[cx,ry-r-1];return[cx,ry+rh+r+1];
}
function resAll(x,y,r){
  for(let b of BLDS){let res=resCR(x,y,r,b.x,b.y,b.w,b.h);if(res){x=res[0];y=res[1];}}
  for(let b of EBLDS){
    for(let wl of b._walls){let res=resCR(x,y,r,wl.x,wl.y,wl.w,wl.h);if(res){x=res[0];y=res[1];}}
    for(let f of b.furniture)if(f.solid){let res=resCR(x,y,r,f.x,f.y,f.w,f.h);if(res){x=res[0];y=res[1];}}
  }
  return[x,y];
}
function bulletHitsWall(bx,by){
  for(let b of BLDS)if(bx>b.x&&bx<b.x+b.w&&by>b.y&&by<b.y+b.h)return true;
  for(let b of EBLDS){
    for(let wl of b._walls)if(crCol(bx,by,2,wl.x,wl.y,wl.w,wl.h))return true;
    for(let f of b.furniture)if(f.solid&&crCol(bx,by,2,f.x,f.y,f.w,f.h))return true;
  }
  return false;
}

// -- Flow field ------------------------------------------------
function cellBlocked(cx,cy){
  let x1=cx*GCELL+7,y1=cy*GCELL+7,x2=(cx+1)*GCELL-7,y2=(cy+1)*GCELL-7;
  function ov(rx,ry,rw,rh){return rw>0&&rh>0&&x1<rx+rw&&x2>rx&&y1<ry+rh&&y2>ry;}
  for(let b of BLDS)if(ov(b.x,b.y,b.w,b.h))return true;
  for(let b of EBLDS){
    for(let wl of b._walls)if(ov(wl.x,wl.y,wl.w,wl.h))return true;
    for(let f of b.furniture)if(f.solid&&ov(f.x,f.y,f.w,f.h))return true;
  }
  return false;
}
// Precomputed blocked-cell bitmap -- built once, reused every BFS
let _blockedBitmap=null;
function buildBlockedBitmap(){
  _blockedBitmap=new Uint8Array(GCOLS*GROWS);
  for(let cy=0;cy<GROWS;cy++)for(let cx=0;cx<GCOLS;cx++){
    _blockedBitmap[cy*GCOLS+cx]=cellBlocked(cx,cy)?1:0;
  }
}
function buildFF(tx,ty){
  // tx/ty = target world coords; defaults to local player
  if(tx===undefined)tx=pl.x;if(ty===undefined)ty=pl.y;
  if(!_blockedBitmap)buildBlockedBitmap();
  let dist=new Int32Array(GCOLS*GROWS).fill(-1),q=new Int32Array(GCOLS*GROWS*2),head=0,tail=0;
  let pcx=Math.max(0,Math.min(GCOLS-1,tx/GCELL|0));
  let pcy=Math.max(0,Math.min(GROWS-1,ty/GCELL|0));
  dist[pcy*GCOLS+pcx]=0;q[tail++]=pcx;q[tail++]=pcy;
  while(head<tail){
    let cx=q[head++],cy=q[head++],d=dist[cy*GCOLS+cx];
    for(let ny=cy-1;ny<=cy+1;ny++)for(let nx=cx-1;nx<=cx+1;nx++){
      if(nx===cx&&ny===cy)continue;if(nx<0||nx>=GCOLS||ny<0||ny>=GROWS)continue;
      let ni=ny*GCOLS+nx;if(dist[ni]!==-1||_blockedBitmap[ni])continue;
      dist[ni]=d+1;q[tail++]=nx;q[tail++]=ny;
    }
  }
  if(!flowField)flowField=new Array(GCOLS*GROWS);
  for(let cy=0;cy<GROWS;cy++)for(let cx=0;cx<GCOLS;cx++){
    let i=cy*GCOLS+cx;if(dist[i]===-1){flowField[i]=[0,0];continue;}
    let best=Infinity,bdx=0,bdy=0;
    for(let ny=cy-1;ny<=cy+1;ny++)for(let nx=cx-1;nx<=cx+1;nx++){
      if(nx===cx&&ny===cy)continue;if(nx<0||nx>=GCOLS||ny<0||ny>=GROWS)continue;
      let nd=dist[ny*GCOLS+nx];if(nd!==-1&&nd<best){best=nd;bdx=nx-cx;bdy=ny-cy;}
    }
    let d2=Math.hypot(bdx,bdy);flowField[i]=d2>0?[bdx/d2,bdy/d2]:[0,0];
  }
}
function getFlowDir(x,y){
  if(!flowField)return nrm(pl.x-x,pl.y-y);
  let cx=Math.max(0,Math.min(GCOLS-1,x/GCELL|0));
  let cy=Math.max(0,Math.min(GROWS-1,y/GCELL|0));
  let[fdx,fdy]=flowField[cy*GCOLS+cx];
  if(fdx===0&&fdy===0)return nrm(pl.x-x,pl.y-y);
  let d=Math.hypot(pl.x-x,pl.y-y);
  if(d<80){let t=1-d/80;let[dx,dy]=nrm(pl.x-x,pl.y-y);return nrm(fdx*(1-t)+dx*t,fdy*(1-t)+dy*t);}
  return[fdx,fdy];
}
function randEdge(){
  let s=Math.floor(Math.random()*4);
  if(s===0)return[Math.random()*WW,-40];if(s===1)return[Math.random()*WW,WH+40];
  if(s===2)return[-40,Math.random()*WH];return[WW+40,Math.random()*WH];
}
function safePt(){
  for(let i=0;i<60;i++){
    let x=80+Math.random()*(WW-160),y=80+Math.random()*(WH-160),ok=true;
    for(let b of BLDS)if(x>b.x-50&&x<b.x+b.w+50&&y>b.y-50&&y<b.y+b.h+50){ok=false;break;}
    if(ok)return[x,y];
  }
  return[WW/2+200,WH/2+200];
}
function bst(x,y,c,n=10,sp=4){
  if(pt.length>280)return; // don't add more if already saturated
  n=Math.min(n,280-pt.length);
  for(let i=0;i<n;i++){let a=Math.random()*Math.PI*2,s=Math.random()*sp+sp*0.4;pt.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,l:1,c,sz:Math.random()*4+2});}
}

// -- Wave composition ------------------------------------------
function waveComp(lv){
  let d=DIFF[difficulty]||DIFF.medium;
  let zc=Math.round((4+Math.floor(lv*2.0)+(lv>5?Math.floor(lv*0.6):0))*d.zombieCountMult);
  let hasBoss=lv%5===0;
  let out={basic:0,runner:0,tank:0,exploder:0,boss:hasBoss?1:0};
  let rem=zc;
  if(lv>=7){out.exploder=Math.max(1,Math.floor(rem*0.12));rem-=out.exploder;}
  if(lv>=5){out.tank=Math.max(1,Math.floor(rem*0.20));rem-=out.tank;}
  if(lv>=3){out.runner=Math.floor(rem*0.40);rem-=out.runner;}
  out.basic=Math.max(1,rem);
  return out;
}

// -- Zombie HP & damage scaling --------------------------------
function zHp(baseHp,lv){
  let d=DIFF[difficulty]||DIFF.medium;
  return Math.ceil(baseHp*(1+lv*0.55)*d.zombieHpMult);
}
function zDmg(lv,armor){return Math.max(1, 6 + Math.floor(lv*1.8) - armor);}

  let zsp=(1.0+lv*0.22)*d.zombieSpeedMult*nightBoost;
  let idx=0;
  let total=Object.values(comp).reduce((a,b)=>a+b,0);
  for(let[type,count] of Object.entries(comp)){
    let zt=ZT[type];if(!zt||count<=0)continue;
    for(let i=0;i<count;i++){
      let p=randEdge();
      let hp=zHp(zt.hp,lv);
      zs.push({x:p[0],y:p[1],sp:zt.spd*zsp+Math.random()*0.2,
        hp,mhp:hp,type,pulse:Math.random()*6.28,
        surroundAng:(idx/Math.max(1,total))*Math.PI*2+Math.random()*0.5,
        attackT:Math.floor(Math.random()*30),swingT:0,swingSide:Math.random()<0.5?1:-1,staggerT:0,
        chargeTimer:0,charging:false,chargeDx:0,chargeDy:0,
        flashT:0,hpBarTimer:0,
        stuckTimer:0,lastX:p[0],lastY:p[1],
        // Death animation
        dying:false,dyingVx:0,dyingVy:0,dyingR:0,dyingTimer:0,
      });

function startNextWave(){

    upgradeChoices=pickUpgrades(3);
    st='upgrade';
  } else {
    waveStartTs=performance.now();
    st='wave_preview';
    spawnWave();
  }

function pickUpgrades(n){
  let pool=UPGRADES.filter(u=>{
    if(u.id==='hp'&&pl.maxHp>=MAX_HP)return false;
    if(u.id==='speed'&&pl.speedMult>=MAX_SPD)return false;
    if(u.id==='armor'&&pl.armor>=MAX_ARMOR)return false;
    return true;
  });
  for(let i=pool.length-1;i>0;i--){let j=Math.random()*i|0;[pool[i],pool[j]]=[pool[j],pool[i]];}
  return pool.slice(0,Math.min(n,pool.length));
}

function applyUpgrade(up){
  if(up.id==='hp'){pl.maxHp=Math.min(MAX_HP,pl.maxHp+40);pl.hp=Math.min(pl.maxHp,pl.hp+20);}
  else if(up.id==='reload'){pl.reloadMult=Math.max(0.3,pl.reloadMult*0.72);}
  else if(up.id==='damage'){pl.dmgBonus++;}
  else if(up.id==='speed'){pl.speedMult=Math.min(MAX_SPD,pl.speedMult+0.15);}
  else if(up.id==='grenade'){pl.grenades+=3;}
  else if(up.id==='melee'){pl.meleeRange+=30;}
  else if(up.id==='armor'){pl.armor=Math.min(MAX_ARMOR,pl.armor+3);}
  else if(up.id==='ammo'){for(let s of pl.inventory)if(s.w!=='pistol')s.ammo=WPN[s.w].ammo;}
  else if(up.id==='pierce'){pl.piercePower++;}
  else if(up.id==='multishot'){pl.multiPistol=true;}
  else if(up.id==='explosive'){pl.explosive=true;}
  else if(up.id==='vampire'){pl.vampire=(pl.vampire||0)+2;}
  else if(up.id==='sprint'){pl.sprintShoot=true;}
  else if(up.id==='chain'){pl.chainMelee=(pl.chainMelee||0)+2;}
  else if(up.id==='extragren'){pl.grenades+=5;}
  coins+=50;metaCoins+=50;
  playSound('levelup');bst(pl.x,pl.y,'#ffdc00',20,6);
  waveStartTs=performance.now();st='wave_preview';spawnWave();
}

// -- Fire ------------------------------------------------------
function fb(){
  let cur=curWpn();
  let dx=wmx()-pl.x,dy=wmy()-pl.y;
  let[nx,ny]=nrm(dx,dy);if(!nx&&!ny){nx=pl.ldx;ny=pl.ldy;}
  let wpn=WPN[cur.w]||WPN.pistol,sp=wpn.bspd,dmg=Math.max(1,Math.round((wpn.dmg+pl.dmgBonus+(cur.dmgMod||0))*(pl.dmgMult||1))),pellts=wpn.pellts;
  if(cur.w==='pistol'&&(pl.mst>0||pl.multiPistol))pellts=3;
  let base=Math.atan2(ny,nx);
  // mk() creates a bullet and, in mpMode, immediately tells the server so other clients see it instantly
  let mk=(ang,extra={})=>{
    let b={x:pl.x,y:pl.y,vx:Math.cos(ang)*sp,vy:Math.sin(ang)*sp,
      l:cur.w==='shotgun'?52:cur.w==='flame'?28:85,dmg,pierce:pl.piercePower,hitCount:0,
      type:wpn.type||'bullet',...extra};
    if(mpMode&&socket)socket.emit('bullet:fire',{x:b.x,y:b.y,vx:b.vx,vy:b.vy,l:b.l,wtype:b.type,dmg:b.dmg,pierce:b.pierce||0});
    return b;
  };

  if(cur.w==='flame'){
    // 8 fire particles per burst, varied size, spread cone
    let count=6+Math.floor(Math.random()*3);
    for(let i=0;i<count;i++){
      let a=base+(Math.random()-0.5)*wpn.sprd*2.2;
      let speed=wpn.bspd*(0.6+Math.random()*0.8);
      let fb2={x:pl.x,y:pl.y,vx:Math.cos(a)*speed,vy:Math.sin(a)*speed,
        l:22+Math.random()*14,type:'flame',
        dmg:Math.max(1,Math.round(dmg*0.8)),pierce:0,hitCount:0,
        sz:14+Math.random()*16};
      bl.push(fb2);
      if(mpMode&&socket)socket.emit('bullet:fire',{x:fb2.x,y:fb2.y,vx:fb2.vx,vy:fb2.vy,l:fb2.l,wtype:'flame',dmg:fb2.dmg,pierce:0});
    }
    // Muzzle glow
    muzzlePos={x:pl.x+nx*(PR+8),y:pl.y+ny*(PR+8)};muzzleFlash=6;
  } else if(cur.w==='rocket'){
    bl.push({...mk(base),type:'rocket',l:140,sz:8});
  } else if(cur.w==='smg'){
    // SMG fires a burst of 3 — mk() handles bullet:fire emit inside each timeout
    for(let b=0;b<3;b++){
      setTimeout(()=>{
        if(st!=='playing')return;
        let a=base+(Math.random()-0.5)*wpn.sprd;
        bl.push(mk(a));
      },b*45);
    }
  } else if(pellts===1){
    bl.push(mk(base+(Math.random()-0.5)*wpn.sprd));
  } else if(cur.w==='shotgun'){
    for(let i=0;i<pellts;i++)bl.push(mk(base+(i/(pellts-1)-0.5)*wpn.sprd));
  } else {
    for(let o of[-0.22,0,0.22])bl.push(mk(base+o));
  }
  shotsFired++;
  let gl=cur.w==='sniper'?28:cur.w==='shotgun'?18:22;
  let[gdx2,gdy2]=nrm(wmx()-pl.x,wmy()-pl.y);
  muzzlePos={x:pl.x+gdx2*(PR+gl),y:pl.y+gdy2*(PR+gl)};muzzleFlash=8;
  let perp=[-gdy2,gdx2],side=Math.random()<0.5?1:-1;
  casings.push({x:pl.x+perp[0]*PR*0.6+gdx2*3,y:pl.y+perp[1]*PR*0.6+gdy2*3,
    vx:perp[0]*side*(2+Math.random()*3)-gdx2,vy:perp[1]*side*(2+Math.random()*3)-gdy2,
    rot:Math.random()*Math.PI*2,rotv:(Math.random()-0.5)*0.4,l:1});
  playSound(cur.w);
  if(cur.w!=='pistol'){cur.ammo--;if(cur.ammo<=0){pl.inventory.splice(pl.slot,1);if(pl.slot>=pl.inventory.length)pl.slot=pl.inventory.length-1;}}
}

// -- Melee -----------------------------------------------------
function doMelee(){
  if(meleeCd>0)return;
  // Combo logic
  if(meleeComboTimer>0&&meleeCombo<3)meleeCombo++;else meleeCombo=1;
  meleeComboTimer=35;
  let[gdx,gdy]=nrm(wmx()-pl.x,wmy()-pl.y);
  let ang=Math.atan2(gdy,gdx);
  let spreadMult=meleeCombo===3?1.5:1.0,dmgMult=meleeCombo===3?2:1;
  for(let i=zs.length-1;i>=0;i--){
    let z=zs[i];if(z.dying)continue;
    let zt=ZT[z.type||'basic'];
    let dx=z.x-pl.x,dy=z.y-pl.y,d=Math.hypot(dx,dy);
    if(d>pl.meleeRange*1.1+zt.r)continue;
    let za=Math.atan2(dy,dx),diff=Math.abs(((za-ang)+Math.PI*3)%(Math.PI*2)-Math.PI);
    if(diff<0.65*spreadMult){
      let dmg=Math.max(1,Math.round((3+pl.dmgBonus)*(pl.dmgMult||1))*dmgMult);z.hp-=dmg;
      z.flashT=10;z.hpBarTimer=120;
      addDmgNum(z.x,z.y-22,dmg,meleeCombo===3?'#ff4400':'#ffcc00');
      totalDmgDealt+=dmg;
      let[kx,ky]=nrm(dx,dy);
      // Knockback
      z.x+=kx*45;z.y+=ky*45;
      if(z.hp<=0)killZ(i,kx*6,ky*6);else bst(z.x,z.y,'#ff8800',6,3);
      // Chain lightning: jump to 2 nearest zombies
      if(pl.chainMelee){
        let nearby=[...zs].filter((z2,ii)=>ii!==i&&!z2.dying&&dst([z.x,z.y],[z2.x,z2.y])<(pl.chainMelee||0)*18+60)
          .sort((a,b2)=>dst([z.x,z.y],[a.x,a.y])-dst([z.x,z.y],[b2.x,b2.y])).slice(0,2);
        for(let z2 of nearby){z2.hp-=Math.max(1,Math.round(dmg*0.6));z2.flashT=8;if(z2.hp<=0){let ii=zs.indexOf(z2);if(ii>=0)killZ(ii);}
          bst((z.x+z2.x)/2,(z.y+z2.y)/2,'#ffee00',5,5);}
      }
    }
  }
  meleeArc={active:true,timer:12,ang,combo:meleeCombo};
  fistAnim={active:true,timer:18,ang,side:meleeCombo%2===0?-1:1,combo:meleeCombo};
  meleeCd=meleeCombo===3?55:40;
  playSound('melee');addShake(meleeCombo===3?5:2);
}

// -- Combo system ----------------------------------------------
function onKill(type){
  comboKills++;comboTimer=150;
  streakKills++;streakTimer=180;
  coins+=5+lv;metaCoins+=2;
  // Vampire healing
  if(pl.vampire)pl.hp=Math.min(pl.maxHp,pl.hp+pl.vampire);
  // Type-specific death sounds
  if(type==='runner')playSound('zombie_die_runner');
  else if(type==='tank')playSound('zombie_die_tank');
  else if(type==='boss')playSound('zombie_die_boss');
  else playSound('zombie_die');
  // Kill streak callouts (escalating)
  let msg='',col='#fff';
  if(streakKills===2){msg='DOUBLE KILL',col='#ffee44';try{sndDoubleKill.currentTime=0.95;sndDoubleKill.play();}catch(e){}}
  else if(streakKills===3){msg='TRIPLE KILL!',col='#ffdc00';playSound('streak');try{sndTripleKill.currentTime=0;sndTripleKill.play();}catch(e){}}
  else if(streakKills===5){msg='KILLING SPREE!',col='#ff8800';playSound('streak');try{sndKillingSpree.currentTime=0;sndKillingSpree.play();}catch(e){}addShake(4);}
  else if(streakKills===8){msg='RAMPAGE!!',col='#ff4400';playSound('streak');try{sndRampage.currentTime=0;sndRampage.play();}catch(e){}addShake(6);}
  else if(streakKills===12){msg='GODLIKE!!!',col='#ff00ff';playSound('streak');try{sndGodlike.currentTime=0;sndGodlike.play();}catch(e){}addShake(8);slowMo=18;}
  else if(streakKills>12&&streakKills%5===0){msg='UNSTOPPABLE x'+streakKills,col='#ff00ff';playSound('streak');try{sndUnstoppable.currentTime=0;sndUnstoppable.play();}catch(e){}}
  if(msg){comboMsg=msg;comboMsgTimer=90;streakMsg=msg;}
  // Legacy combo for existing system
  if(comboKills>=10&&comboKills%5===0)playSound('combo');
}

// -- Kill zombie -----------------------------------------------
function killZ(i,vx=0,vy=0){
  let z=zs[i];let zt=ZT[z.type||'basic'];
  if(z.dying)return;
  let nightMult=nightAlpha>0.5?2:1;
  sc+=zt.xp*lv*nightMult;kills++;shotsHit++;
  addDecal(z.x,z.y,zt.r+8,'#4a0000');
  addKillFeed(zt.label,zt.col);
  onKill(z.type);
  // XP orb
  xpOrbs.push({x:z.x,y:z.y,l:1,val:zt.xp});
  // Start death animation
  z.dying=true;z.dyingVx=vx||((Math.random()-0.5)*8);z.dyingVy=vy||((Math.random()-0.5)*8-2);
  z.dyingTimer=22;
  // In mpMode: tell server so it can sync the kill to other clients + track wave progress
  if(mpMode&&socket&&z.id)socket.emit('zombie:killed',{id:z.id,type:z.type});
  playSound('zombie_die');
  // Hit-stop: brief freeze on heavy kills, longer on boss/tank
  if(z.type==='boss')hitStop=Math.max(hitStop,6);
  else if(z.type==='tank')hitStop=Math.max(hitStop,3);
  else hitStop=Math.max(hitStop,1);
  if(z.type==='boss'){
    slowMo=120;addShake(20);
    bst(z.x,z.y,'#ff0000',12,8);
    bst(z.x,z.y,'#ff8800',8,6);
    playSound('boss_die');announce('Boss eliminated');addDmgNum(z.x,z.y-50,'BOSS DOWN!','#ffdc00');
  }
  if(z.type==='exploder'){
    // Delay runner spawns so they don't spawn on player
    setTimeout(()=>{
      let zsp=1.0+lv*0.22;
      for(let j=0;j<3;j++){
        let a=j*(Math.PI*2/3)+Math.random()*0.5;
        let rx=z.x+Math.cos(a)*60,ry=z.y+Math.sin(a)*60;
        let[rx2,ry2]=resAll(rx,ry,ZT.runner.r);
        let hp=zHp(1,lv);
        zs.push({x:rx2,y:ry2,sp:ZT.runner.spd*zsp+0.5,hp,mhp:hp,type:'runner',
          pulse:Math.random()*6.28,surroundAng:Math.random()*Math.PI*2,
          attackT:0,swingT:0,swingSide:1,staggerT:0,chargeTimer:0,charging:false,chargeDx:0,chargeDy:0,
          flashT:0,hpBarTimer:0,stuckTimer:0,lastX:rx2,lastY:ry2,dying:false,dyingVx:0,dyingVy:0,dyingTimer:0});
      }
    },400);
    bst(z.x,z.y,'#ffaa00',18,6);addShake(4);playSound('explode');
  }
  // Don't splice yet -- let death animation play out in update loop
}

// -- Grenade ---------------------------------------------------
function throwGrenade(){
  if(pl.grenades<=0)return;
  pl.grenades--;
  let dx=wmx()-pl.x,dy=wmy()-pl.y;
  let throwD=Math.min(Math.hypot(dx,dy),250+grCharge*200);
  let[nx,ny]=nrm(dx,dy);
  grenWorld.push({x:pl.x,y:pl.y,vx:nx*(throwD/42),vy:ny*(throwD/42),t:70});
  grCharge=0;grCharging=false;playSound('grenade_throw');
}
function explodeGrenade(gr){
  let exR=100;addShake(14);
  bst(gr.x,gr.y,'#ff8800',16,8);
  bst(gr.x,gr.y,'#ffdd00',8,12);
  addDecal(gr.x,gr.y,35,'#2a1000');playSound('explode');
  // Shockwave ring
  pt.push({type:'ring',x:gr.x,y:gr.y,r:0,maxR:exR,l:1});
  for(let i=zs.length-1;i>=0;i--){
    let z=zs[i];if(z.dying)continue;
    let d=dst([z.x,z.y],[gr.x,gr.y]);
    if(d<exR){
      let dmg=Math.ceil((1-d/exR)*10)+3;z.hp-=dmg;z.flashT=10;z.hpBarTimer=120;
      addDmgNum(z.x,z.y-22,dmg,'#ff8800');totalDmgDealt+=dmg;
      let[kx,ky]=nrm(z.x-gr.x,z.y-gr.y);z.x+=kx*60;z.y+=ky*60;
      if(z.hp<=0)killZ(i,kx*10,ky*10);
    }
  }
}

// -- Unstuck ---------------------------------------------------
function explodeDestructible(d){
  if(!d.alive)return;
  d.alive=false;
  let exR=d.type==='car'?120:70;
  addShake(d.type==='car'?12:7);
  playSound('barrel_explode');
  bst(d.x,d.y,'#ff8800',d.type==='car'?18:10,d.type==='car'?10:7);
  bst(d.x,d.y,'#ffdd00',6,8);
  addDecal(d.x,d.y,d.type==='car'?40:20,'#2a1000');
  pt.push({type:'ring',x:d.x,y:d.y,r:0,maxR:exR,l:1});
  // Blast zombies away
  for(let i=zs.length-1;i>=0;i--){
    let z=zs[i],dd=dst([z.x,z.y],[d.x,d.y]);
    if(dd<exR){
      let dmg=Math.ceil((1-dd/exR)*(d.type==='car'?12:6))+2;
      z.hp-=dmg;addDmgNum(z.x,z.y-20,dmg,'#ff8800');
      let[kx,ky]=nrm(z.x-d.x,z.y-d.y);z.x+=kx*60;z.y+=ky*60;
      if(z.hp<=0)killZ(i,kx*8,ky*8);
    }
  }
}
function unstuck(z){
  let moved=Math.hypot(z.x-z.lastX,z.y-z.lastY);
  if(moved<0.4&&!z.dying&&z.staggerT===0&&!z.charging){
    z.stuckTimer++;
    if(z.stuckTimer>70){
      // Push in random direction away from player
      let ang=Math.atan2(z.y-pl.y,z.x-pl.x)+Math.random()*1.2-0.6;
      let push=ZT[z.type||'basic'].r*3+20;
      let[nx,ny]=resAll(z.x+Math.cos(ang)*push,z.y+Math.sin(ang)*push,ZT[z.type||'basic'].r);
      z.x=nx;z.y=ny;z.stuckTimer=0;
    }
  } else {z.stuckTimer=0;}
  z.lastX=z.x;z.lastY=z.y;
}

// Returns the nearest alive player to world pos (zx,zy).
// In singleplayer always returns pl. In multiplayer checks pl + all mpPlayers.
function nearestPlayerTo(zx,zy){
  let best=pl,bestD=Math.hypot(zx-pl.x,zy-pl.y);
  if(mpMode){
    for(let p of mpPlayers){
      if(p.id===mpMyId||!p.alive)continue;
      let d=Math.hypot(zx-p.x,zy-p.y);
      if(d<bestD){bestD=d;best=p;}
    }
  }
  return best; // pl or an mpPlayers entry ({x,y,id,...})
}

// -- Zombie AI (shared between singleplayer and mpMode) ---------
function updZombies(dt){
  for(let i=zs.length-1;i>=0;i--){
    let z=zs[i];
    if(z.dying){
      z.x+=z.dyingVx;z.y+=z.dyingVy;z.dyingVx*=0.82;z.dyingVy*=0.82;
      z.dyingTimer--;if(z.dyingTimer<=0){zs.splice(i,1);continue;}
      continue;
    }
    if(z.flashT>0)z.flashT--;if(z.hpBarTimer>0)z.hpBarTimer--;
    z.pulse=(z.pulse+0.09*dt)%(Math.PI*2);
    if(z.staggerT>0)z.staggerT-=dt;if(z.swingT>0)z.swingT=Math.max(0,z.swingT-0.06*dt);
    let sep_x=0,sep_y=0;
    for(let z2 of zs){
      if(z2===z||z2.dying)continue;
      let d2=dst([z.x,z.y],[z2.x,z2.y]),sepR=ZT[z.type||'basic'].r*3.2;
      if(d2<sepR&&d2>0){let w=(1-d2/sepR)*(1-d2/sepR);let[rx2,ry2]=nrm(z.x-z2.x,z.y-z2.y);sep_x+=rx2*w*2.2;sep_y+=ry2*w*2.2;}
    }
    // Find nearest player for this zombie to target (supports multiplayer)
    let tgt=nearestPlayerTo(z.x,z.y);
    let tgtX=tgt.x,tgtY=tgt.y;
    let isLocalTgt=(tgt===pl); // true when targeting the local player

    let skipMove=false;
    if(z.type==='boss'){
      z.chargeTimer+=dt;
      if(!z.charging&&z.chargeTimer>90){
        z.charging=true;z.chargeTimer=0;
        let[cdx,cdy]=nrm(tgtX-z.x,tgtY-z.y);
        let offset=(Math.random()-0.5)*0.6;let ca=Math.atan2(cdy,cdx)+offset;
        z.chargeDx=Math.cos(ca);z.chargeDy=Math.sin(ca);
        if(isLocalTgt){addShake(5);addDmgNum(z.x,z.y-60,'CHARGE!','#ff4400');}
      }
      if(z.charging){
        let[zrx2,zry2]=resAll(z.x+z.chargeDx*z.sp*4.5*dt,z.y+z.chargeDy*z.sp*4.5*dt,ZT.boss.r);
        let moved=Math.hypot(zrx2-z.x,zry2-z.y);z.x=zrx2;z.y=zry2;z.chargeTimer+=dt;
        if(z.chargeTimer>60||moved<0.5){z.charging=false;z.chargeTimer=0;}skipMove=true;
      }
    }
    if(z.type==='runner'&&!skipMove){
      if(!z.zigzagTimer||z.zigzagTimer<=0){z.zigzagOffset=(Math.random()-0.5)*2.2;z.zigzagTimer=25+Math.random()*20;}
      z.zigzagTimer-=dt;
    }
    if(!skipMove&&z.staggerT<=0){
      let dToP=dst([z.x,z.y],[tgtX,tgtY]),moveX=0,moveY=0;
      let[fdx,fdy]=getFlowDir(z.x,z.y);
      if(z.type==='runner'){
        if(dToP<300){
          let[pdx,pdy]=nrm(tgtX-z.x,tgtY-z.y);let flankAngle=z.flankSide||1;
          let perp=[-pdy*flankAngle,pdx*flankAngle];
          moveX=pdx*0.6+perp[0]*0.4;moveY=pdy*0.6+perp[1]*0.4;
          if(!z.flankTimer||z.flankTimer<=0){z.flankSide=(Math.random()<0.5?1:-1);z.flankTimer=60+Math.random()*60;}
          z.flankTimer-=dt;
        }else{moveX=fdx;moveY=fdy;}
        if(z.zigzagOffset){let perp2=nrm(-moveY,moveX);moveX+=perp2[0]*z.zigzagOffset*0.4;moveY+=perp2[1]*z.zigzagOffset*0.4;}
      }else if(z.type==='exploder'){
        if(dToP>200){moveX=fdx*0.6;moveY=fdy*0.6;}
        else{let[pdx,pdy]=nrm(tgtX-z.x,tgtY-z.y);moveX=pdx*1.8;moveY=pdy*1.8;}
      }else{
        if(dToP<240&&!bulletHitsWall((z.x+tgtX)/2,(z.y+tgtY)/2)){
          let stx=tgtX+Math.cos(z.surroundAng)*(ZT[z.type||'basic'].r+PR+4);
          let sty=tgtY+Math.sin(z.surroundAng)*(ZT[z.type||'basic'].r+PR+4);
          let[sdx,sdy]=nrm(stx-z.x,sty-z.y);moveX=fdx*0.55+sdx*0.45;moveY=fdy*0.55+sdy*0.45;
        }else{moveX=fdx;moveY=fdy;}
      }
      moveX+=(Math.random()-0.5)*0.12;moveY+=(Math.random()-0.5)*0.12;
      let[ndx,ndy]=nrm(moveX+sep_x*0.5,moveY+sep_y*0.5);
      let[zrx,zry]=resAll(z.x+ndx*z.sp*dt,z.y+ndy*z.sp*dt,ZT[z.type||'basic'].r);
      z.x=zrx;z.y=zry;
    }
    unstuck(z);
    // Attack nearest player — only apply damage when targeting local player (each client handles own HP)
    let atkR=ZT[z.type||'basic'].r+PR+10;
    if(dst([z.x,z.y],[tgtX,tgtY])<atkR){
      if(isLocalTgt&&pl.sht>0){
        bst(pl.x,pl.y,'#1ec8ff',10,4);let[rx2,ry2]=nrm(z.x-pl.x,z.y-pl.y);z.x+=rx2*55;z.y+=ry2*55;
      }else{
        z.attackT+=dt;
        if(z.attackT%38<dt){z.swingT=1.0;z.swingSide*=-1;}
        if(isLocalTgt&&z.attackT%38>18&&z.attackT%38<18+dt*2&&pl.inv===0&&pl.medInv===0){
          let dmg=zDmg(lv,pl.armor);pl.hp-=dmg;pl.inv=50;
          addDmgDir(z.x,z.y);addShake(6);
          if(z.type==='tank'){let[kx,ky]=nrm(pl.x-z.x,pl.y-z.y);pl.x+=kx*30;pl.y+=ky*30;pl.inv=80;addShake(10);addDmgNum(pl.x,pl.y-PR-14,'STUNNED!','#ff8800');}
          bst(pl.x,pl.y,'#ff1e1e',10,3);addDmgNum(pl.x,pl.y-PR-10,dmg,'#ff3030');playSound('hit');
          if(mpMode&&socket)socket.emit('player:hit',{damage:dmg});
          if(pl.hp<=0){pl.hp=0;if(!mpMode){st='game_over';saveMeta();}bst(pl.x,pl.y,'#ff0000',40,7);}
        }
      }
    }else z.attackT=0;
  }
}

// -- Update ----------------------------------------------------
function upd(){
  tk++;
  // Hit-stop: freeze gameplay for a few frames after impactful kills
  if(hitStop>0){hitStop--;return;}
  let dt=slowMo>0?0.35:1.0; // slow-mo factor
  if(slowMo>0)slowMo--;

  // Prep phase countdown
  if(st==='prep'){
    updPlayerMove(dt);updCam();updParticles();
    updPickups();
    // Decay timers so melee arc / grenade state don't get stuck
    if(pl.inv>0)pl.inv--;if(scd>0)scd--;
    if(meleeCd>0)meleeCd--;if(meleeArc.timer>0)meleeArc.timer--;else meleeArc.active=false;
    if(fistAnim.timer>0)fistAnim.timer--;else fistAnim.active=false;
    if(muzzleFlash>0)muzzleFlash--;
    if(grCharging){grCharge=Math.min(1,grCharge+0.018);}
    if(mpMode){
      // MP prep: send position every frame so other players see us moving.
      // Prep ends when server sends wave:zombies, not via local timer.
      if(announceMsgTimer>0)announceMsgTimer--;
      if(comboMsgTimer>0)comboMsgTimer--;
      for(let k in ammoFlash){ammoFlash[k]--;if(ammoFlash[k]<=0)delete ammoFlash[k];}
      for(let i=killFeed.length-1;i>=0;i--){killFeed[i].l-=0.008;if(killFeed[i].l<=0)killFeed.splice(i,1);}
      for(let i=dmgNums.length-1;i>=0;i--){let d=dmgNums[i];d.y+=d.vy;d.vy*=0.95;d.l-=0.025;if(d.l<=0)dmgNums.splice(i,1);}
      for(let i=casings.length-1;i>=0;i--){let cs=casings[i];cs.x+=cs.vx;cs.y+=cs.vy;cs.vx*=0.88;cs.vy*=0.88;cs.rot+=cs.rotv;cs.rotv*=0.95;cs.l-=0.02;if(cs.l<=0)casings.splice(i,1);}
      for(let i=decals.length-1;i>=0;i--){decals[i].l-=0.002;if(decals[i].l<=0)decals.splice(i,1);}
      for(let i=xpOrbs.length-1;i>=0;i--){let o=xpOrbs[i];o.l-=0.015;if(o.l<=0)xpOrbs.splice(i,1);}
      for(let i=dmgDirs.length-1;i>=0;i--){dmgDirs[i].l-=0.018;if(dmgDirs[i].l<=0)dmgDirs.splice(i,1);}
      if(prepTimer>0){prepTimer--;mpPrepStuck=0;}
      else{
        // Timer hit 0 — waiting for wave:zombies from server.
        // If it doesn't arrive within 3s, ask the server to kick off the wave.
        if(!mpPrepStuck)mpPrepStuck=0;
        mpPrepStuck++;
        if(mpPrepStuck===180&&socket)socket.emit('wave:request'); // 3s grace
      }
      let _tn=(lv>0&&lv%6===0)?1:0;
      if(_tn&&nightAlpha<0.85)nightAlpha=Math.min(0.85,nightAlpha+0.003);
      else if(!_tn&&nightAlpha>0)nightAlpha=Math.max(0,nightAlpha-0.003);
      mpSendInput();
      return;
    }
    // Singleplayer prep:
    prepTimer--;
    if(prepTimer<=0){
      spawnWave();waveInfo=waveComp(lv);
      waveStartTs=performance.now();st='wave_preview';
    }
    return;
  }
  if(st==='wave_preview'){updParticles();return;}
  if(st==='wave_clear'){
    updParticles();waveClearTimer--;
    if(waveClearTimer<=0)startNextWave();
    return;
  }
  if(st!=='playing'){updParticles();return;}

  // In multiplayer: run all local updates (movement, timers, bullets, zombie AI, FX)
  // Server owns: player positions (auth), HP validation, wave progression, bullet sync to others
  if(mpMode){
    updPlayerMove(dt);updCam();
    if(pl.inv>0)pl.inv--;if(pl.sht>0)pl.sht--;if(pl.spt>0)pl.spt--;
    if(pl.rft>0)pl.rft--;if(pl.mst>0)pl.mst--;if(pl.medInv>0)pl.medInv--;if(scd>0)scd--;if(lb>0)lb--;
    if(meleeCd>0)meleeCd--;if(meleeArc.timer>0)meleeArc.timer--;else meleeArc.active=false;
    if(fistAnim.timer>0)fistAnim.timer--;else fistAnim.active=false;
    if(meleeComboTimer>0)meleeComboTimer--;else{meleeCombo=0;}
    if(muzzleFlash>0)muzzleFlash--;
    if(grCharging){grCharge=Math.min(1,grCharge+0.018);}
    for(let k in ammoFlash){ammoFlash[k]--;if(ammoFlash[k]<=0)delete ammoFlash[k];}
    if(announceMsgTimer>0)announceMsgTimer--;
    if(comboMsgTimer>0)comboMsgTimer--;
    if(comboTimer>0){comboTimer--;if(comboTimer===0)comboKills=0;}
    if(streakTimer>0){streakTimer--;}else{streakKills=0;}
    for(let i=killFeed.length-1;i>=0;i--){killFeed[i].l-=0.008;if(killFeed[i].l<=0)killFeed.splice(i,1);}
    for(let i=dmgNums.length-1;i>=0;i--){let d=dmgNums[i];d.y+=d.vy;d.vy*=0.95;d.l-=0.025;if(d.l<=0)dmgNums.splice(i,1);}
    for(let i=casings.length-1;i>=0;i--){let cs=casings[i];cs.x+=cs.vx;cs.y+=cs.vy;cs.vx*=0.88;cs.vy*=0.88;cs.rot+=cs.rotv;cs.rotv*=0.95;cs.l-=0.02;if(cs.l<=0)casings.splice(i,1);}
    for(let i=decals.length-1;i>=0;i--){decals[i].l-=0.002;if(decals[i].l<=0)decals.splice(i,1);}
    for(let i=xpOrbs.length-1;i>=0;i--){let o=xpOrbs[i];let dx=scx(pl.x)-scx(o.x),dy=scy(pl.y)-scy(o.y);let d=Math.hypot(dx,dy);if(d<18){xpOrbs.splice(i,1);continue;}let sp2=Math.max(2,8-d*0.02);o.x+=dx/d*sp2;o.y+=dy/d*sp2;o.l-=0.015;if(o.l<=0)xpOrbs.splice(i,1);}
    for(let i=dmgDirs.length-1;i>=0;i--){dmgDirs[i].l-=0.018;if(dmgDirs[i].l<=0)dmgDirs.splice(i,1);}
    updPickups();  // crate loot is local per player — each client tracks their own taken state
    updParticles();
    // Flamethrower auto-fire on hold in multiplayer (other weapons fire on mousedown/keydown)
    if(mouseHeld&&scd===0){let cur=curWpn();if(cur.w==='flame'){fb();scd=Math.round(WPN.flame.cd*(pl.reloadMult||1));}}
    // ── Local bullet physics — full damage (same as singleplayer) ──
    for(let i=bl.length-1;i>=0;i--){
      let b=bl[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt;
      let hw=bulletHitsWall(b.x,b.y);
      if(b.l<=0||hw||b.x<-20||b.x>WW+20||b.y<-20||b.y>WH+20){if(hw)bst(b.x,b.y,'#bbb',3,2);bl.splice(i,1);continue;}
      let bhit=false;
      for(let j=zs.length-1;j>=0;j--){
        let z=zs[j];if(z.dying)continue;
        if(dst([b.x,b.y],[z.x,z.y])<BR+ZT[z.type||'basic'].r){
          if(b.type==='rocket'){
            let exR=110;addShake(14);bst(b.x,b.y,'#ff8800',16,9);bst(b.x,b.y,'#ffdd00',8,12);
            pt.push({type:'ring',x:b.x,y:b.y,r:0,maxR:exR,l:1});addDecal(b.x,b.y,35,'#2a1000');
            for(let k=zs.length-1;k>=0;k--){if(zs[k].dying)continue;let dd=dst([b.x,b.y],[zs[k].x,zs[k].y]);if(dd<exR){let rd=Math.ceil((1-dd/exR)*12)+3;zs[k].hp-=rd;addDmgNum(zs[k].x,zs[k].y-20,rd,'#ff8800');let[kx2,ky2]=nrm(zs[k].x-b.x,zs[k].y-b.y);zs[k].x+=kx2*55;zs[k].y+=ky2*55;if(socket)socket.emit('zombie:damage',{id:zs[k].id,damage:rd});if(zs[k].hp<=0)killZ(k,kx2*7,ky2*7);}}
            playSound('explode');bl.splice(i,1);bhit=true;break;
          }
          z.hp-=b.dmg;z.flashT=10;z.hpBarTimer=120;
          addDmgNum(z.x,z.y-20,b.dmg);totalDmgDealt+=b.dmg;
          let[kx,ky]=nrm(b.vx,b.vy);z.x+=kx*18;z.y+=ky*18;
          bst(z.x,z.y,b.type==='flame'?'#ff6600':'#ff5020',5,3);
          if(socket)socket.emit('zombie:damage',{id:z.id,damage:b.dmg});
          if(z.hp<=0)killZ(j,kx*5,ky*5);
          if(b.pierce>0)b.pierce--;else{bl.splice(i,1);bhit=true;break;}
        }
      }
      if(bhit)continue;
    }
    // ── Advance remote players' bullets locally at 60fps (from bullet:fired events) ──
    for(let i=mpRemoteBullets.length-1;i>=0;i--){
      let b=mpRemoteBullets[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt;
      let hw=bulletHitsWall(b.x,b.y);
      if(b.l<=0||hw||b.x<-20||b.x>WW+20||b.y<-20||b.y>WH+20){
        if(hw)bst(b.x,b.y,'#bbb',3,2);
        mpRemoteBullets.splice(i,1);
      }
    }
    // ── Night mode transitions (waves 6, 12, 18...) ──
    let _targetNight=(lv>0&&lv%6===0)?1:0;
    if(_targetNight&&nightAlpha<0.85)nightAlpha=Math.min(0.85,nightAlpha+0.003);
    else if(!_targetNight&&nightAlpha>0)nightAlpha=Math.max(0,nightAlpha-0.003);
    // ── During prep phase skip zombie AI (no zombies yet) ──
    if(st!=='prep'){
      // ── Flow field rebuild — target centroid of all alive players so zombies split between players ──
      ffTimer--;if(ffTimer<=0){
        // Compute centroid of local player + all alive teammates
        let ftx=pl.x,fty=pl.y,fn=1;
        for(let p of mpPlayers){if(p.id!==mpMyId&&p.alive){ftx+=p.x;fty+=p.y;fn++;}}
        ftx/=fn;fty/=fn;
        let pcx=ftx/GCELL|0,pcy=fty/GCELL|0;
        if(pcx!==_lastFFcx||pcy!==_lastFFcy){buildFF(ftx,fty);_lastFFcx=pcx;_lastFFcy=pcy;}
        ffTimer=30;
      }
      if(tk%120===0&&zs.length>0)for(let i=0;i<zs.length;i++)zs[i].surroundAng=(i/zs.length)*Math.PI*2+Math.random()*0.5;
      // ── Run zombie AI locally (singleplayer feel in multiplayer) ──
      updZombies(dt);
      // ── Host relays all zombie positions at 5–10Hz so both screens stay in sync ──
      if(socket&&mpRoom&&mpRoom.host===mpMyId&&tk%6===0){
        for(let z of zs){
          if(z.dying)continue;
          if(z.type==='boss')
            socket.emit('zombie:pos',{id:z.id,x:z.x,y:z.y,charging:z.charging,chargeDx:z.chargeDx||0,chargeDy:z.chargeDy||0});
          else if(tk%12===0) // regular zombies at 5Hz — enough to keep them close
            socket.emit('zombie:pos',{id:z.id,x:z.x,y:z.y});
        }
      }
    }
    mpSendInput();
    return;
  }

  ffTimer--;if(ffTimer<=0){
    let pcx=pl.x/GCELL|0,pcy=pl.y/GCELL|0;
    if(pcx!==_lastFFcx||pcy!==_lastFFcy){buildFF();_lastFFcx=pcx;_lastFFcy=pcy;}
    ffTimer=30;
  }
  if(tk%120===0&&zs.length>0)for(let i=0;i<zs.length;i++)zs[i].surroundAng=(i/zs.length)*Math.PI*2+Math.random()*0.5;

  updPlayerMove(dt);updCam();

  if(pl.inv>0)pl.inv--;if(pl.sht>0)pl.sht--;if(pl.spt>0)pl.spt--;
  if(pl.rft>0)pl.rft--;if(pl.mst>0)pl.mst--;if(pl.medInv>0)pl.medInv--;if(scd>0)scd--;if(lb>0)lb--;
  // Flamethrower: hold mouse to continuously fire
  if(mouseHeld&&scd===0&&st==='playing'){
    let cur=curWpn();
    if(cur.w==='flame'){
      fb();let cd=Math.round(WPN.flame.cd*(pl.reloadMult||1));scd=cd;
    }
  }
  if(meleeCd>0)meleeCd--;if(meleeArc.timer>0)meleeArc.timer--;else meleeArc.active=false;
  if(fistAnim.timer>0)fistAnim.timer--;else fistAnim.active=false;
  if(meleeComboTimer>0)meleeComboTimer--;else{meleeCombo=0;}
  if(muzzleFlash>0)muzzleFlash--;
  if(grCharging){grCharge=Math.min(1,grCharge+0.018);}
  for(let k in ammoFlash){ammoFlash[k]--;if(ammoFlash[k]<=0)delete ammoFlash[k];}
  if(comboTimer>0){comboTimer--;if(comboTimer===0)comboKills=0;}
  if(comboMsgTimer>0)comboMsgTimer--;
  if(announceMsgTimer>0)announceMsgTimer--;
  if(streakTimer>0){streakTimer--;}else{streakKills=0;}
  // Day/night: one night wave every 6 levels (waves 6, 12, 18, 24, ...)
  let targetNight=(lv>0&&lv%6===0)?1:0;
  if(targetNight&&nightAlpha<0.85)nightAlpha=Math.min(0.85,nightAlpha+0.003);
  else if(!targetNight&&nightAlpha>0)nightAlpha=Math.max(0,nightAlpha-0.003);
  for(let i=killFeed.length-1;i>=0;i--){killFeed[i].l-=0.008;if(killFeed[i].l<=0)killFeed.splice(i,1);}

  // XP orbs drift toward player
  for(let i=xpOrbs.length-1;i>=0;i--){
    let o=xpOrbs[i];let dx=scx(pl.x)-(scx(o.x)),dy=scy(pl.y)-(scy(o.y));
    let d=Math.hypot(dx,dy);if(d<18){xpOrbs.splice(i,1);continue;}
    let sp2=Math.max(2,8-d*0.02);o.x+=dx/d*sp2;o.y+=dy/d*sp2;o.l-=0.015;
    if(o.l<=0)xpOrbs.splice(i,1);
  }

  // Bullets
  for(let i=bl.length-1;i>=0;i--){
    let b=bl[i];b.x+=b.vx*dt;b.y+=b.vy*dt;b.l-=dt;
    let hw=bulletHitsWall(b.x,b.y);
    if(b.l<=0||hw||b.x<-20||b.x>WW+20||b.y<-20||b.y>WH+20){if(hw)bst(b.x,b.y,'#bbb',3,2);bl.splice(i,1);continue;}
    let hit=false;
    for(let j=zs.length-1;j>=0;j--){
      let z=zs[j];if(z.dying)continue;
      if(dst([b.x,b.y],[z.x,z.y])<BR+ZT[z.type||'basic'].r){
        if(b.type==='rocket'){
          // Rocket AoE
          let exR=110;addShake(14);bst(b.x,b.y,'#ff8800',16,9);bst(b.x,b.y,'#ffdd00',8,12);
          pt.push({type:'ring',x:b.x,y:b.y,r:0,maxR:exR,l:1});addDecal(b.x,b.y,35,'#2a1000');
          for(let k=zs.length-1;k>=0;k--){
            if(zs[k].dying)continue;
            let dd=dst([b.x,b.y],[zs[k].x,zs[k].y]);
            if(dd<exR){let rd=Math.ceil((1-dd/exR)*12)+3;zs[k].hp-=rd;addDmgNum(zs[k].x,zs[k].y-20,rd,'#ff8800');
              let[kx2,ky2]=nrm(zs[k].x-b.x,zs[k].y-b.y);zs[k].x+=kx2*55;zs[k].y+=ky2*55;
              if(zs[k].hp<=0)killZ(k,kx2*7,ky2*7);}
          }
          for(let d of destructibles){if(!d.alive)continue;if(dst([b.x,b.y],[d.x,d.y])<exR)explodeDestructible(d);}
          playSound('explode');bl.splice(i,1);hit=true;break;
        }
        z.hp-=b.dmg;z.flashT=10;z.hpBarTimer=120;
        addDmgNum(z.x,z.y-20,b.dmg);totalDmgDealt+=b.dmg;
        let[kx,ky]=nrm(b.vx,b.vy);z.x+=kx*18;z.y+=ky*18;
        bst(z.x,z.y,b.type==='flame'?'#ff6600':'#ff5020',5,3);
        // Explosive rounds: small AoE splash
        if(pl.explosive&&b.type!=='flame'){
          for(let k=zs.length-1;k>=0;k--){
            if(k===j||zs[k].dying)continue;
            if(dst([z.x,z.y],[zs[k].x,zs[k].y])<45){zs[k].hp-=1;if(zs[k].hp<=0)killZ(k);}
          }
          bst(z.x,z.y,'#ff8800',4,4);
        }
        // Chain melee lightning
        if(pl.chainMelee&&b.type==='flame'){/* chain on melee handled separately */}
        if(z.hp<=0)killZ(j,kx*5,ky*5);
        if(b.pierce>0){b.pierce--;}else{bl.splice(i,1);hit=true;break;}
      }
    }
    // Bullet hits destructible
    if(!hit){
      for(let d of destructibles){
        if(!d.alive)continue;
        let dr=d.type==='car'?28:12;
        if(dst([b.x,b.y],[d.x,d.y])<dr){
          d.hp-=b.dmg;if(d.hp<=0)explodeDestructible(d);
          bl.splice(i,1);hit=true;break;
        }
      }
    }
    if(hit)continue;
  }

  // Grenades
  for(let i=grenWorld.length-1;i>=0;i--){
    let gr=grenWorld[i];gr.x+=gr.vx*dt;gr.y+=gr.vy*dt;gr.t-=dt;
    if(gr.t<=0||bulletHitsWall(gr.x,gr.y)){explodeGrenade(gr);grenWorld.splice(i,1);}
  }

  updZombies(dt);

  updPickups();
  updParticles();
  for(let i=casings.length-1;i>=0;i--){let cs=casings[i];cs.x+=cs.vx;cs.y+=cs.vy;cs.vx*=0.88;cs.vy*=0.88;cs.rot+=cs.rotv;cs.rotv*=0.95;cs.l-=0.02;if(cs.l<=0)casings.splice(i,1);}
  for(let i=decals.length-1;i>=0;i--){decals[i].l-=0.002;if(decals[i].l<=0)decals.splice(i,1);}
  for(let i=dmgNums.length-1;i>=0;i--){let d=dmgNums[i];d.y+=d.vy;d.vy*=0.95;d.l-=0.025;if(d.l<=0)dmgNums.splice(i,1);}
  for(let i=dmgDirs.length-1;i>=0;i--){dmgDirs[i].l-=0.018;if(dmgDirs[i].l<=0)dmgDirs.splice(i,1);}

  // Check wave end (singleplayer only — mpMode wave end is server-driven via wave:clear)
  if(!mpMode&&st==='playing'&&zs.length===0){
    // Safe room bonus: if player is inside a building when wave ends
    let inBuilding=EBLDS.findIndex(b=>pl.x>b.x&&pl.x<b.x+b.w&&pl.y>b.y&&pl.y<b.y+b.h);
    if(inBuilding>=0&&inBuilding!==lastBuildingId){
      lastBuildingId=inBuilding;
      pl.hp=Math.min(pl.maxHp,pl.hp+25);
      for(let s of pl.inventory)if(s.w!=='pistol')s.ammo=Math.min(WPN[s.w].ammo,s.ammo+Math.floor(WPN[s.w].ammo*0.3));
      addDmgNum(pl.x,pl.y-40,'SAFE ROOM +HP +AMMO','#22ff88');
      playSound('saferoom');bst(pl.x,pl.y,'#22ff88',14,5);
    }
    // Wave clear celebration: slow-mo burst + score flyout
    slowMo=80;addShake(8);
    bst(pl.x,pl.y,'#ffdc00',20,8);
    nl();
  }
}

function updPickups(){
  // Power-ups
  for(let i=pu.length-1;i>=0;i--){
    let u=pu[i];u.pulse=(u.pulse+0.1)%(Math.PI*2);
    if(dst([u.x,u.y],[pl.x,pl.y])<UR+PR){
      let t=u.pd.type;
      if(t==='health'){pl.hp=Math.min(pl.maxHp,pl.hp+60);sc+=100;}
      else if(t==='shield'){pl.sht=210;sc+=80;}else if(t==='speed'){pl.spt=210;sc+=80;}
      else if(t==='rapid'){pl.rft=210;sc+=80;}else if(t==='multi'){pl.mst=180;sc+=80;}
      else if(t==='nuke'){for(let i2=zs.length-1;i2>=0;i2--)if(!zs[i2].dying)killZ(i2);bst(pl.x,pl.y,'#c864ff',50,9);sc+=300;}
      bst(u.x,u.y,u.pd.col,14,4);pu.splice(i,1);playSound('pickup');
    }
  }
  // Hospital medkit
  for(let b of EBLDS){
    if(!b.medkit||b.medkit.taken)continue;
    if(dst([b.medkit.wx,b.medkit.wy],[pl.x,pl.y])<22){
      b.medkit.taken=true;
      pl.hp=pl.maxHp;pl.medInv=300;
      bst(b.medkit.wx,b.medkit.wy,'#22ff88',20,6);
      addDmgNum(b.medkit.wx,b.medkit.wy-24,'FULL HEAL + INVINCIBLE!','#22ff88');
      playSound('pickup');sc+=250;
    }
  }
  // Weapon crates
  for(let b of EBLDS)for(let cr of b.crates)
    if(!cr.taken&&dst([cr.wx,cr.wy],[pl.x,pl.y])<22){
      cr.taken=true;sc+=75;coins+=10;bst(cr.wx,cr.wy,'#ffdd00',14,5);playSound('pickup');
      // 25% chance of weapon mod (extended mag or damage mod)
      let mod=null;
      if(Math.random()<0.25&&cr.w!=='pistol'){
        mod=Math.random()<0.5?'xmag':'dmg'; // extended mag or damage
        addDmgNum(cr.wx,cr.wy-20,mod==='xmag'?'EXT MAG!':'DMG MOD!','#ffee00');
      }
      let baseAmmo=WPN[cr.w]?WPN[cr.w].ammo:30;
      let finalAmmo=mod==='xmag'?Math.round(baseAmmo*1.5):baseAmmo;
      let ei=pl.inventory.findIndex(s=>s.w===cr.w);
      if(ei>=0){
        // Already have it — refill ammo + apply mod
        pl.inventory[ei].ammo=Math.min(baseAmmo*2,pl.inventory[ei].ammo+finalAmmo);
        if(mod==='dmg'&&!pl.inventory[ei].dmgMod)pl.inventory[ei].dmgMod=1;
        ammoFlash[ei]=25;
        addDmgNum(cr.wx,cr.wy-14,'+AMMO','#ffaa00');
      } else if(pl.inventory.length<8){
        // Free slot — add it (don't auto-switch; keep current weapon held)
        let slot={w:cr.w,ammo:finalAmmo};if(mod==='dmg')slot.dmgMod=1;
        let newIdx=pl.inventory.length;
        pl.inventory.push(slot);ammoFlash[newIdx]=25;
      } else {
        // Full — replace a non-current, non-pistol weapon when possible
        let rep=pl.inventory.findIndex((s,i)=>s.w!=='pistol'&&i!==pl.slot);
        if(rep<0)rep=pl.inventory.findIndex(s=>s.w!=='pistol');
        if(rep<0)rep=1;
        let slot={w:cr.w,ammo:finalAmmo};if(mod==='dmg')slot.dmgMod=1;
        pl.inventory[rep]=slot;ammoFlash[rep]=25;
        addDmgNum(cr.wx,cr.wy-14,'SWAPPED','#ff8800');
      }
      // Sync updated inventory to server (for server-side bullet stats)
      if(mpMode&&socket)socket.emit('player:setInventory',{inventory:pl.inventory.map(s=>({w:s.w,ammo:s.ammo===Infinity?-1:s.ammo}))});
    }
}

function updPlayerMove(dt){
  let dx=0,dy=0;
  if(ks['a']||ks['ArrowLeft'])dx-=1;if(ks['d']||ks['ArrowRight'])dx+=1;
  if(ks['w']||ks['ArrowUp'])dy-=1;if(ks['s']||ks['ArrowDown'])dy+=1;
  let sp=PSPD*pl.speedMult*(pl.spt>0?1.6:1)*dt,ln=Math.hypot(dx,dy);
  if(ln>0){dx=dx/ln*sp;dy=dy/ln*sp;pl.ldx=dx/sp;pl.ldy=dy/sp;}
  let[rx,ry]=resAll(Math.max(PR,Math.min(WW-PR,pl.x+dx)),Math.max(PR,Math.min(WH-PR,pl.y+dy)),PR);
  pl.x=rx;pl.y=ry;
}
function updParticles(){
  for(let i=pt.length-1;i>=0;i--){
    let p=pt[i];
    if(p.type==='ring'){p.r+=8;p.l-=0.06;if(p.l<=0)pt.splice(i,1);continue;}
    p.x+=p.vx;p.y+=p.vy;p.vx*=0.9;p.vy*=0.9;p.l-=0.035;if(p.l<=0)pt.splice(i,1);
  }
}

function drawFurn(f){
  let bx=scx(f.x),by=scy(f.y);if(bx+f.w<-10||bx-10>W||by+f.h<-10||by-10>H)return;
  if(f.type==='drum'){let r2=f.w/2;X.fillStyle=f.col;X.beginPath();X.arc(bx+r2,by+r2,r2,0,Math.PI*2);X.fill();X.strokeStyle=f.dark;X.lineWidth=1.5;X.stroke();return;}
  if(f.type==='car'){
    X.fillStyle=f.col;X.fillRect(bx+3,by+5,f.w-6,f.h-10);X.strokeStyle=f.dark;X.lineWidth=2;X.strokeRect(bx+3,by+5,f.w-6,f.h-10);
    X.fillStyle='rgba(110,170,220,0.35)';X.fillRect(bx+6,by+7,f.w-12,f.h*0.28);X.fillRect(bx+6,by+f.h*0.65,f.w-12,f.h*0.26);
    X.fillStyle='#141414';for(let[wx,wy]of[[bx,by+7],[bx+f.w-8,by+7],[bx,by+f.h-14],[bx+f.w-8,by+f.h-14]])X.fillRect(wx,wy,8,12);
    return;
  }
  if(f.type==='container'){
    X.fillStyle=f.col;X.fillRect(bx,by,f.w,f.h);X.strokeStyle=f.dark;X.lineWidth=2;X.strokeRect(bx,by,f.w,f.h);
    X.strokeStyle='rgba(0,0,0,0.1)';X.lineWidth=1;for(let cx2=bx+10;cx2<bx+f.w-5;cx2+=10){X.beginPath();X.moveTo(cx2,by);X.lineTo(cx2,by+f.h);X.stroke();}
    return;
  }
  if(f.type==='vehicle'){
    X.fillStyle=f.col;X.fillRect(bx+4,by+10,f.w-8,f.h-10);X.strokeStyle=f.dark;X.lineWidth=1.5;X.strokeRect(bx+4,by+10,f.w-8,f.h-10);
    X.fillStyle='#aaa';X.fillRect(bx+8,by,f.w-16,12);return;
  }

function drawZombie(z){
  let zx=scx(z.x),zy=scy(z.y);
  let zt=ZT[z.type||'basic'];
  let alpha=z.dying?Math.max(0,z.dyingTimer/22):1;
  if(alpha<=0)return;
  if(zx<-80||zx>W+80||zy<-80||zy>H+80)return;
  X.globalAlpha=alpha;
  if(z.type==='boss'){drawBoss(z,zx,zy);X.globalAlpha=1;return;}
  let r=zt.r+Math.sin(z.pulse)*(z.type==='runner'?1:2);
  let[adx,ady]=nrm(pl.x-z.x,pl.y-z.y),perp=[-ady,adx];
  let swingAmt=z.swingT*Math.sin(z.swingT*Math.PI);
  X.fillStyle='#000510';
  X.globalAlpha=0.32*alpha;X.beginPath();X.ellipse(zx+3,zy+6,r,r*0.45,0,0,Math.PI*2);X.fill();
  X.globalAlpha=0.16*alpha;X.beginPath();X.ellipse(zx+3,zy+6,r+4,r*0.58,0,0,Math.PI*2);X.fill();
  X.globalAlpha=alpha;
  X.lineCap='round';
  for(let si=0;si<2;si++){
    let s=si===0?1:-1,shx=zx+perp[0]*r*0.55*s,shy=zy+perp[1]*r*0.55*s;
    let isSwing=(z.swingSide===s),swAng=isSwing?swingAmt*1.4:-swingAmt*0.5;
    let ba=Math.atan2(ady,adx)+swAng,rdx=Math.cos(ba),rdy=Math.sin(ba);
    let armR=r+12+(isSwing?swingAmt*16:0);let ex=shx+rdx*armR,ey=shy+rdy*armR;
    let atk=isSwing&&swingAmt>0.2;
    X.strokeStyle=atk?`rgba(255,${(80-swingAmt*60)|0},0,0.9)`:zt.col;X.lineWidth=atk?7:5;
    X.beginPath();X.moveTo(shx,shy);X.lineTo(ex,ey);X.stroke();
    X.fillStyle=atk?`rgba(255,${(60-swingAmt*60)|0},0,0.9)`:zt.dark;X.beginPath();X.arc(ex,ey,atk?5:3.5,0,Math.PI*2);X.fill();
    if(atk&&swingAmt>0.35){X.strokeStyle='rgba(255,50,0,0.7)';X.lineWidth=1;for(let c=-1;c<=1;c++){let ca=ba+c*0.3;X.beginPath();X.moveTo(ex,ey);X.lineTo(ex+Math.cos(ca)*9,ey+Math.sin(ca)*9);X.stroke();}}
  }
  // Body glow
  X.globalAlpha=z.dying?0:swingAmt>0.3?0.22:0.08;
  X.fillStyle=swingAmt>0.3?'#ff3000':zt.col;X.beginPath();X.arc(zx,zy,r+8,0,Math.PI*2);X.fill();X.globalAlpha=alpha;
  // Hit flash: white overlay
  if(z.flashT>0){
    X.globalAlpha=(z.flashT/10)*0.75*alpha;X.fillStyle='#ffffff';X.beginPath();X.arc(zx,zy,r+2,0,Math.PI*2);X.fill();X.globalAlpha=alpha;
  }
  // Body
  X.fillStyle=zt.col;X.beginPath();
  for(let i=0;i<=10;i++){let ang=(i/10)*Math.PI*2+z.pulse*0.16,br=r+(i%3===0?3.5:i%3===1?-1.5:1);X.lineTo(zx+Math.cos(ang)*br,zy+Math.sin(ang)*br);}
  X.closePath();X.fill();X.strokeStyle=zt.dark;X.lineWidth=2;X.stroke();
  // Hit flash overlay on body
  if(z.flashT>0){X.globalAlpha=(z.flashT/10)*0.6*alpha;X.fillStyle='#fff';X.fill();X.globalAlpha=alpha;}
  // Eyes
  let eFwd={x:zx+adx*r*0.28,y:zy+ady*r*0.28};
  for(let s of[-1,1]){
    let ex=eFwd.x+perp[0]*5*s,ey=eFwd.y+perp[1]*5*s;
    X.fillStyle=swingAmt>0.25?'#ff4000':'#ff1c1c';X.beginPath();X.arc(ex,ey,z.type==='runner'?3:4,0,Math.PI*2);X.fill();
    X.fillStyle='#ff9090';X.beginPath();X.arc(ex,ey,1.5,0,Math.PI*2);X.fill();
  }
  // HP bar -- show on hit, for all zombies
  if(z.hpBarTimer>0&&!z.dying){
    let fade=Math.min(1,z.hpBarTimer/20);
    let bw=r*2+10,bx2=zx-bw/2,by2=zy-r-14;
    X.globalAlpha=fade*alpha;
    X.fillStyle='#1a1a1a';X.fillRect(bx2,by2,bw,5);
    let frac=Math.max(0,z.hp/z.mhp);
    X.fillStyle=frac>0.5?'#22dd22':frac>0.25?'#ddaa00':'#dd2222';X.fillRect(bx2,by2,bw*frac,5);
    X.strokeStyle='rgba(0,0,0,0.5)';X.lineWidth=0.5;X.strokeRect(bx2,by2,bw,5);
    X.globalAlpha=alpha;
  }
  // Tank: always show HP pips
  if(z.type==='tank'&&z.hp>0&&!z.dying){
    for(let i=0;i<Math.min(z.mhp,10);i++){
      let filled=i<z.hp;
      X.fillStyle=filled?'#ff6400':'#333';X.beginPath();X.arc(zx-5+i*7,zy+r+8,3,0,Math.PI*2);X.fill();
    }
  }
  X.globalAlpha=1;
}

function drawPlayer(ppx,ppy){

  if(pl.sht>0){let sp2=Math.sin(tk*0.22)*5;X.globalAlpha=0.5;X.strokeStyle='#1ec8ff';X.lineWidth=3;X.beginPath();X.arc(ppx,ppy,PR+16+sp2,0,Math.PI*2);X.stroke();X.globalAlpha=0.1;X.fillStyle='#1ec8ff';X.fill();X.globalAlpha=1;}

  let cur2=curWpn();
  let gl=cur2.w==='sniper'?28:cur2.w==='shotgun'?18:22;
  let gw=cur2.w==='shotgun'?7:cur2.w==='sniper'?3:5;

  X.lineTo(ppx+gox+gdx*gl+perp[0]*gw/2,ppy+goy+gdy*gl+perp[1]*gw/2);X.lineTo(ppx+gox+gdx*gl-perp[0]*gw/2,ppy+goy+gdy*gl-perp[1]*gw/2);
  X.closePath();X.fill();
  X.beginPath();X.arc(ppx,ppy,PR,0,Math.PI*2);X.fillStyle='#1a3a8a';X.fill();X.strokeStyle='#0a1a5a';X.lineWidth=2;X.stroke();
  // Rim light on top-left edge

  X.strokeStyle='rgba(255,255,255,0.38)';X.lineWidth=2.2;
  X.beginPath();X.arc(ppx-0.6,ppy-0.6,PR-0.3,Math.PI*1.05,Math.PI*1.72);X.stroke();
  X.strokeStyle='rgba(255,255,255,0.18)';X.lineWidth=1.2;
  X.beginPath();X.arc(ppx-0.6,ppy-0.6,PR-2.2,Math.PI*1.15,Math.PI*1.62);X.stroke();
  X.restore();
  let a1=Math.atan2(gdy,gdx)-Math.PI*0.55,a2=Math.atan2(gdy,gdx)+Math.PI*0.55;
  X.fillStyle='#2854c8';X.beginPath();X.arc(ppx,ppy,PR-2,a1,a2);X.lineTo(ppx,ppy);X.closePath();X.fill();
  let hx=ppx+gdx*4,hy=ppy+gdy*4;

    for(let si=0;si<2;si++){
      let s=si===0?1:-1;
      let isPunching=(s===fistAnim.side);
      let ext=isPunching?punch*34:0; // punching fist extends forward

      X.lineWidth=isPunching?6:4;X.lineCap='round';
      X.beginPath();X.moveTo(baseX,baseY);X.lineTo(fx,fy);X.stroke();
      // Fist circle

        X.fillStyle=isCombo3?'#ff6600':'#ffcc44';

  X.beginPath();X.moveTo(ms.x-10,ms.y);X.lineTo(ms.x+10,ms.y);X.stroke();
  X.beginPath();X.moveTo(ms.x,ms.y-10);X.lineTo(ms.x,ms.y+10);X.stroke();
}

// -- Draw -----------------------------------------------------
function draw(){
  X.setTransform(1,0,0,1,0,0);
  X.fillStyle='#000';X.fillRect(0,0,C.width,C.height);
  X.setTransform(SCALE,0,0,SCALE,0,0);
  if(st==='menu'){dmenu();return;}
  if(st==='lobby'){dlobby();return;}
  if(st==='room_lobby'){droomlobby();return;}
  if(st==='charselect'){drawCharSelect();return;}
  if(st==='shop'){drawShop();return;}
  if(st==='difficulty'){drawDifficulty();return;}
  if(st==='game_over'){dgover();return;}
  if(st==='paused'){drawPaused();return;}

  // Shake
  if(shakePow>0){shakeX=(Math.random()-0.5)*shakePow*2.2;shakeY=(Math.random()-0.5)*shakePow*2.2;X.save();X.translate(shakeX,shakeY);}
  shakePow=Math.max(0,shakePow-0.65);

  // Slow-mo colour shift
  if(slowMo>0){X.fillStyle=`rgba(0,0,50,${slowMo/120*0.22})`;X.fillRect(0,0,W,H);}

  // -- Terrain base ------------------------------------------
  X.fillStyle='#4a6832';X.fillRect(-10,-10,W+20,H+20);
  // Subtle grass texture grid

// -- Off-screen teammate arrows (always visible in MP) -----------
function drawMpOffscreenArrows(){
  if(!mpMode||!mpPlayers.length)return;
  const charCols=['#2854c8','#c89020','#28a050'];
  let topMargin=st==='prep'?68:20; // clear the prep banner if active
  for(let p of mpPlayers){
    if(p.id===mpMyId||!p.alive)continue;
    let sx=scx(p.x),sy=scy(p.y);
    // Only draw arrow if player is off-screen (or close to edge)
    if(sx>30&&sx<W-30&&sy>topMargin&&sy<H-30)continue;
    let ang=Math.atan2(sy-H/2,sx-W/2);
    let margin=28,dsx=sx-W/2,dsy=sy-H/2;
    let tsx=Math.abs(dsx)>0.001?Math.abs((W/2-margin)/dsx):Infinity;
    let tsy=Math.abs(dsy)>0.001?Math.abs((H/2-margin)/dsy):Infinity;
    let tc=Math.min(tsx,tsy);
    let ex=Math.max(margin,Math.min(W-margin,W/2+dsx*tc));
    let ey=Math.max(topMargin+margin,Math.min(H-margin,H/2+dsy*tc));
    let col=charCols[p.char||0]||'#4488ff';
    let alpha=0.72+Math.sin(tk*0.12)*0.28;
    X.save();X.globalAlpha=alpha;
    X.translate(ex,ey);X.rotate(ang);
    X.fillStyle=col;X.strokeStyle='rgba(255,255,255,0.9)';X.lineWidth=1.5;
    X.beginPath();X.moveTo(11,0);X.lineTo(-6,6);X.lineTo(-3,0);X.lineTo(-6,-6);X.closePath();
    X.fill();X.stroke();
    X.restore();
    X.globalAlpha=alpha;
    X.fillStyle='#fff';X.font='bold 9px sans-serif';X.textAlign='center';X.textBaseline='top';
    X.fillText(p.name.slice(0,10),ex,ey+13);
    X.globalAlpha=1;
  }
}

function drawWavePreview(){
  X.globalAlpha=0.78;X.fillStyle='#040a02';X.fillRect(0,0,W,H);X.globalAlpha=1;

  let spacing=Math.min(150,560/Math.max(1,types.length));
  let bx0=W/2-types.length*spacing/2+spacing/2;
  for(let i=0;i<types.length;i++){
    let[type,count]=types[i];let zt=ZT[type];

    X.fillStyle='#555';X.font='10px sans-serif';X.fillText(exHp+' HP',tx,ty+r2+40);
  }
  let countdownAlpha=secsLeft===0?0.5:1;

  X.fillStyle=secsLeft===0?'#ff4040':'#fff';X.font='bold 72px sans-serif';X.textAlign='center';X.textBaseline='middle';

}

    let yc=H*(0.15+i*0.18)+Math.sin(tk*(0.006+i*0.003)+i*1.2)*30;
    let alpha=0.035+Math.sin(tk*0.009+i*1.2)*0.018;

    fg.addColorStop(0,'transparent');fg.addColorStop(0.5,`rgba(120,0,0,${alpha})`);fg.addColorStop(1,'transparent');
    X.fillStyle=fg;X.fillRect(0,yc-40,W,80);

    for(let s of[-1,1]){X.beginPath();X.moveTo(bx+s*8*sc,by-8*sc);X.lineTo(bx+s*20*sc,by-14*sc+limb*s*5);X.stroke();}
    X.globalAlpha=1;
  }

  // Blood drips from top
  let drips=[[W/2-180,6,9],[W/2-55,3,7],[W/2+95,8,9],[W/2+230,5,7],[75,4,6],[625,7,9],[320,5,7]];
  X.fillStyle='#5a0000';

    X.beginPath();X.arc(dx,Math.max(dw/2,pulse),dw/2,0,Math.PI*2);X.fill();

  X.globalAlpha=0.12;X.fillStyle='#ff2200';X.font='bold 38px sans-serif';X.fillText('SELECT DIFFICULTY',W/2+2,52);X.globalAlpha=1;
  X.fillStyle='#cc1010';X.font='bold 38px sans-serif';X.fillText('SELECT DIFFICULTY',W/2,50);
  // Divider
  let barA=0.5+Math.sin(tk*0.07)*0.3;

    X.beginPath();X.moveTo(c.x+14,c.y+5.5);X.lineTo(c.x+c.w-14,c.y+5.5);X.stroke();X.restore();

  // Items -- tighter spacing, all 4 fit without overlapping PLAY AGAIN
  let shopY=108,itemH=66,gap=6;

    rrx(W/2-260,iy,520,itemH,8,cG,
      owned?'rgba(40,200,40,0.45)':canBuy?'rgba(200,150,0,0.35)':'rgba(60,60,60,0.25)',1);

    X.save();X.globalAlpha=0.2;X.strokeStyle='rgba(255,255,255,0.6)';X.lineWidth=1;
    X.beginPath();X.moveTo(W/2-248,iy+1.5);X.lineTo(W/2+248,iy+1.5);X.stroke();X.restore();
    // Icon
    X.fillStyle=owned?'#22cc44':item.col;X.beginPath();X.arc(W/2-220,iy+itemH/2,20,0,Math.PI*2);X.fill();
    X.globalAlpha=0.45;X.fillStyle='#000';X.beginPath();X.arc(W/2-220,iy+itemH/2,20,0,Math.PI*2);X.fill();X.globalAlpha=1;
    X.fillStyle=owned?'#22cc44':item.col;X.font='bold 11px sans-serif';X.textAlign='center';X.textBaseline='middle';
    X.fillText(owned?'OK':item.cost+'c',W/2-220,iy+itemH/2);
    X.fillStyle=owned?'#44ee44':'#fff';X.font='bold 13px sans-serif';X.textAlign='left';X.textBaseline='middle';
    X.fillText(item.label,W/2-190,iy+20);
    X.fillStyle='rgba(200,180,160,0.5)';X.font='10px sans-serif';X.fillText(item.desc,W/2-190,iy+40);
    if(!owned){
      let bx=W/2+148,by=iy+itemH/2-14,bHov=ms.x>=bx&&ms.x<=bx+98&&ms.y>=by&&ms.y<=by+28;

      rrx(bx,by+bDy,98,28,6,buyG,canBuy?(bHov?'#ffe040':'#ffd700'):'#555',1.5);
      X.globalAlpha=canBuy?(bHov?0.45:0.25):0.15;

    }
  }
  // PLAY AGAIN -- always below items, never overlapping
  let pY=shopY+META_SHOP.length*(itemH+gap)+14;
  let pHov=ms.x>=W/2-110&&ms.x<=W/2+110&&ms.y>=pY&&ms.y<=pY+44;

  X.fillStyle='rgba(255,255,255,0.2)';X.font='10px sans-serif';X.fillText('ESC  --  Back',W/2,pY+58);
}

function dmenu(){
  // ── Background ──────────────────────────────────────────────
  X.fillStyle='#020002';X.fillRect(0,0,W,H);

  // Scrolling dark vertical scan-lines
  let slOff=(tk*0.4)%40;
  X.strokeStyle='rgba(60,0,0,0.08)';X.lineWidth=1;
  for(let x=-slOff;x<W+40;x+=20){X.beginPath();X.moveTo(x,0);X.lineTo(x,H);X.stroke();}

  // Animated fog bands
  for(let i=0;i<5;i++){
    let speed=0.006+i*0.003,phase=i*1.2;
    let yc=H*(0.15+i*0.18)+Math.sin(tk*speed+phase)*30;
    let alpha=0.04+Math.sin(tk*0.009+phase)*0.02;
    let fg=X.createLinearGradient(0,yc-40,0,yc+40);
    fg.addColorStop(0,'transparent');fg.addColorStop(0.5,`rgba(120,0,0,${alpha})`);fg.addColorStop(1,'transparent');
    X.fillStyle=fg;X.fillRect(0,yc-40,W,80);
  }

  // ── Particle rain (blood drops) ──────────────────────────────
  if(!dmenu._drops){dmenu._drops=[];for(let i=0;i<40;i++)dmenu._drops.push({x:Math.random()*W,y:Math.random()*H,vy:0.8+Math.random()*1.4,len:6+Math.random()*14,alpha:0.1+Math.random()*0.25});}
  for(let d of dmenu._drops){
    d.y+=d.vy;if(d.y>H+20)d.y=-20;
    X.globalAlpha=d.alpha;X.strokeStyle='#660000';X.lineWidth=1.5;
    X.beginPath();X.moveTo(d.x,d.y);X.lineTo(d.x,d.y+d.len);X.stroke();
  }
  X.globalAlpha=1;

  // ── Dust motes drifting upward (ambient atmosphere) ──────────
  if(!dmenu._motes){dmenu._motes=[];for(let i=0;i<34;i++)dmenu._motes.push({x:Math.random()*W,y:Math.random()*H,vy:-0.2-Math.random()*0.35,r:0.7+Math.random()*1.5,ph:Math.random()*Math.PI*2,sw:0.3+Math.random()*0.6});}
  for(let m of dmenu._motes){
    m.y+=m.vy;if(m.y<-10){m.y=H+10;m.x=Math.random()*W;}
    let sx=m.x+Math.sin(tk*0.02+m.ph)*m.sw*7;
    let a=0.12+Math.sin(tk*0.03+m.ph)*0.09;
    X.globalAlpha=Math.max(0,a);X.fillStyle='#ffe8cc';
    X.beginPath();X.arc(sx,m.y,m.r,0,Math.PI*2);X.fill();
  }
  X.globalAlpha=1;

  // ── Ground fog ───────────────────────────────────────────────
  let gFog=X.createLinearGradient(0,H-100,0,H);
  gFog.addColorStop(0,'transparent');gFog.addColorStop(1,'rgba(50,0,0,0.55)');
  X.fillStyle=gFog;X.fillRect(0,H-100,W,100);

  let mnFill=X.createLinearGradient(0,bY+mnDy,0,bY+mnDy+bH);

  rrx(mnX,bY+mnDy,bHalf,bH,8,mnFill,mBtnHov?'#ff4040':'rgba(180,20,20,0.5)',mBtnHov?1.5:1);

// -- Input -----------------------------------------------------
document.addEventListener('keydown',e=>{
  ks[e.key]=true;
  if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();
  // ESC = pause/resume
  if(e.key==='Escape'){
    if(st==='charselect'){st='menu';return;}
    if(st==='difficulty'){st='charselect';return;}
    if(st==='shop'){st='menu';return;}
    if(st==='playing'||st==='prep'){pausedFrom=st;st='paused';}
    else if(st==='paused'){st=pausedFrom||'playing';}
    return;
  }
  if(st==='paused'){
    if(e.key==='r'||e.key==='R'){ig();}
    return;
  }
  if(e.key===' '&&(st==='playing'||st==='prep')&&scd===0){
    fb();let cur=curWpn();let wpn=WPN[cur.w]||WPN.pistol;
    let cd=Math.round(wpn.cd*pl.reloadMult);if(cur.w==='pistol'&&pl.rft>0)cd=6;scd=cd;
  }
  if((e.key==='f'||e.key==='F')&&(st==='playing'||st==='prep'))doMelee();
  if((e.key==='g'||e.key==='G')&&(st==='playing'||st==='prep')&&pl.grenades>0&&!grCharging){grCharging=true;grCharge=0;}
  if(st==='playing'||st==='prep'){
    if(e.key==='q'||e.key==='Q')switchRel(-1);if(e.key==='e'||e.key==='E')switchRel(1);
    if(e.key==='1')doSwitch(0);if(e.key==='2')doSwitch(1);if(e.key==='3')doSwitch(2);if(e.key==='4')doSwitch(3);
  }
  if(e.key==='S'&&st==='menu'){initAudio();st='charselect';}
  if((e.key==='r'||e.key==='R')&&st==='game_over'){if(!runSaved){saveHS();runSaved=true;}st='shop';}
});
document.addEventListener('keyup',e=>{
  ks[e.key]=false;
  if((e.key==='g'||e.key==='G')&&grCharging)throwGrenade();
});
C.addEventListener('wheel',e=>{if(st==='playing'||st==='prep'){e.preventDefault();switchRel(e.deltaY>0?1:-1);}},{passive:false});
C.addEventListener('mousedown',e=>{
  mouseHeld=true;
  if(st!=='playing'&&st!=='prep')return;
  let r=C.getBoundingClientRect();
  let mx=(e.clientX-r.left)/SCALE,my=(e.clientY-r.top)/SCALE;
  let wSlots=pl.inventory.map((s,i)=>({...s,idx:i,kind:'weapon'}));
  let allSlots=[...wSlots,{w:'melee',kind:'melee'},{w:'grenade',kind:'grenade'}];
  let slotW=70,slotH=46,gap=5,totalW=allSlots.length*(slotW+gap)-gap;
  let bx0=W/2-totalW/2,by0=H-slotH-8;
  for(let i=0;i<allSlots.length;i++){
    let wx=bx0+i*(slotW+gap),wy=by0;
    if(mx>=wx&&mx<=wx+slotW&&my>=wy&&my<=wy+slotH){
      if(allSlots[i].kind==='grenade'&&pl.grenades>0&&!grCharging){
        grCharging=true;grCharge=0;
      }
      return;
    }
  }
});
document.addEventListener('mouseup',e=>{
  mouseHeld=false;
  if(grCharging){throwGrenade();}
});
C.addEventListener('mousemove',e=>{
  let r=C.getBoundingClientRect();ms.x=(e.clientX-r.left)/SCALE;ms.y=(e.clientY-r.top)/SCALE;
  if(st==='upgrade'){
    let cW=178,cH=168,gap=16,n=upgradeChoices.length,totalW=n*(cW+gap)-gap,bx0=W/2-totalW/2;
    hoveredUpgrade=-1;
    for(let i=0;i<n;i++){let cx2=bx0+i*(cW+gap),cy2=H/2-cH/2+10;if(ms.x>=cx2&&ms.x<=cx2+cW&&ms.y>=cy2&&ms.y<=cy2+cH)hoveredUpgrade=i;}
  }
});
C.addEventListener('click',e=>{
  let r=C.getBoundingClientRect();ms.x=(e.clientX-r.left)/SCALE;ms.y=(e.clientY-r.top)/SCALE;
  // Character select
  if(st==='charselect'){
    const cards=[{i:0,x:W/2-280,y:120,w:160,h:220},{i:1,x:W/2-80,y:120,w:160,h:220},{i:2,x:W/2+120,y:120,w:160,h:220}];
    for(let c of cards){
      if(ms.x>=c.x&&ms.x<=c.x+c.w&&ms.y>=c.y&&ms.y<=c.y+c.h){selectedChar=c.i;return;}
    }
    // CONTINUE button
    let btnY=370,btnX=W/2-100;
    if(ms.x>=btnX&&ms.x<=btnX+200&&ms.y>=btnY&&ms.y<=btnY+44){st='difficulty';return;}
    // Back button
    let backY=btnY+54,backW=140,backH=28,backX=W/2-backW/2;
    if(ms.x>=backX&&ms.x<=backX+backW&&ms.y>=backY&&ms.y<=backY+backH){st='menu';return;}
    return;
  }
  // Meta shop
  if(st==='shop'){
    let shopY=108,itemH=66,gap=6;
    for(let i=0;i<META_SHOP.length;i++){
      let item=META_SHOP[i],iy=shopY+i*(itemH+gap);
      let bx=W/2+148,by=iy+itemH/2-14;
      if(ms.x>=bx&&ms.x<=bx+98&&ms.y>=by&&ms.y<=by+28){
        if(!metaUnlocks[item.id]&&metaCoins>=item.cost){
          metaCoins-=item.cost;metaUnlocks[item.id]=true;saveMeta();playSound('levelup');
          bst(W/2+cam.x,H/2+cam.y,'#ffd700',10,5);
        }
        return;
      }
    }
    // BACK TO MENU / PLAY AGAIN button
    let pY=shopY+META_SHOP.length*(itemH+gap)+14;
    if(ms.x>=W/2-110&&ms.x<=W/2+110&&ms.y>=pY&&ms.y<=pY+44){st='charselect';return;}
    return;
  }
  if(st==='difficulty'){
    const cards=[
      {key:'easy',   x:W/2-310,y:90,w:190,h:245},
      {key:'medium', x:W/2-85, y:90,w:190,h:245},
      {key:'hard',   x:W/2+140,y:90,w:190,h:245},
    ];
    for(let c of cards){
      let btnY=c.y+c.h+10,btnH=34;
      let inCard=ms.x>=c.x&&ms.x<=c.x+c.w&&ms.y>=c.y&&ms.y<=c.y+c.h;
      let inBtn =ms.x>=c.x&&ms.x<=c.x+c.w&&ms.y>=btnY&&ms.y<=btnY+btnH;
      if(inCard||inBtn){
        difficulty=c.key;
        ig();
        return;
      }
    }
    if(ms.y>H-30){st='menu';}
    return;
  }
  if(st==='upgrade'){
    let cW=178,cH=168,gap=16,n=upgradeChoices.length,totalW=n*(cW+gap)-gap,bx0=W/2-totalW/2;
    for(let i=0;i<n;i++){let cx2=bx0+i*(cW+gap),cy2=H/2-cH/2+10;if(ms.x>=cx2&&ms.x<=cx2+cW&&ms.y>=cy2&&ms.y<=cy2+cH){applyUpgrade(upgradeChoices[i]);return;}}
    return;
  }
  if(st==='playing'||st==='prep'){
    // Hit-test the unified slot bar (weapons + melee + grenade)
    let wSlots=pl.inventory.map((s,i)=>({...s,idx:i,kind:'weapon'}));
    let allSlots=[...wSlots,{w:'melee',kind:'melee'},{w:'grenade',kind:'grenade'}];
    let slotW=70,slotH=46,gap=5,totalW=allSlots.length*(slotW+gap)-gap;
    let bx0=W/2-totalW/2,by0=H-slotH-8;
    for(let i=0;i<allSlots.length;i++){
      let wx=bx0+i*(slotW+gap),wy=by0;
      if(ms.x>=wx&&ms.x<=wx+slotW&&ms.y>=wy&&ms.y<=wy+slotH){
        let s=allSlots[i];
        if(s.kind==='weapon'){doSwitch(s.idx);}
        else if(s.kind==='melee'){doMelee();}
        else if(s.kind==='grenade'&&pl.grenades>0){
          // Single click = throw at current charge (or 25% minimum)
          if(grCharging){throwGrenade();}
          else{grCharge=0.25;throwGrenade();}
        }
        return;
      }
    }
    if(st==='playing'&&scd===0){fb();let cur=curWpn();let wpn=WPN[cur.w]||WPN.pistol;let cd=Math.round(wpn.cd*pl.reloadMult);if(cur.w==='pistol'&&pl.rft>0)cd=6;scd=cd;}
  }
  if(st==='menu'){
    initAudio();
    let panelW=520,panelH=260,panelY=H/2-panelH/2-40;
    let bW=180,bH=46,bX=W/2-bW/2,bY=panelY+panelH-30;
    let sW=140,sH=34,sX=W/2-sW/2,sY=bY+bH+10;
    let mpBW=140,mpBH=34,mpBX=W/2-mpBW/2,mpBY=sY+sH+10;
    if(ms.x>=bX&&ms.x<=bX+bW&&ms.y>=bY&&ms.y<=bY+bH) st='charselect';
    else if(ms.x>=sX&&ms.x<=sX+sW&&ms.y>=sY&&ms.y<=sY+sH) st='shop';
    else if(ms.x>=mpBX&&ms.x<=mpBX+mpBW&&ms.y>=mpBY&&ms.y<=mpBY+mpBH){mpInitLobby();}
    return;
  }
  if(st==='lobby'){mpLobbyClick(ms.x,ms.y);return;}
  if(st==='room_lobby'){mpRoomLobbyClick(ms.x,ms.y);return;}
  if(st==='game_over'){
    // Geometry must match dgover() layout
    let panelY=H/2-180,statsY=panelY+80,lbY=statsY+5*22+8;
    let rY=lbY+80,bY=rY+80,bH=32,bGap=10,bHalf=(260-bGap)/2;
    let rsX=W/2-130,mnX=W/2-130+bHalf+bGap;
    // Main Menu button (always works)
    if(ms.x>=mnX&&ms.x<=mnX+bHalf&&ms.y>=bY&&ms.y<=bY+bH){if(!runSaved){saveHS();runSaved=true;}st='menu';return;}
    // Restart button
    if(ms.x>=rsX&&ms.x<=rsX+bHalf&&ms.y>=bY&&ms.y<=bY+bH){if(!runSaved){saveHS();runSaved=true;}st='shop';return;}
    // Respawn button (only if affordable)
    if(ms.x>=W/2-130&&ms.x<=W/2+130&&ms.y>=rY&&ms.y<=rY+42){
      if(coins>=respawnCost())doRespawn();
      return;
    }
    return;
  }
  if(st==='paused'&&ms.y>H-80)ig();
});

// ── Multiplayer lobby UI ───────────────────────────────────────────
function mpInitLobby(){
  mpMode=false;
  if(!socket){
    mpConnecting=true;
    socket=io(MP_SERVER_URL,{transports:['websocket'],upgrade:false});
    socket.on('connect',()=>{mpMyId=socket.id;mpConnecting=false;socket.emit('lobby:list',data=>{mpLobbyRooms=data.rooms||[];});st='lobby';});
    socket.on('connect_error',()=>{mpConnecting=false;alert('Cannot connect to server.\nMake sure the server URL is set correctly.');socket=null;});
    socket.on('lobby:rooms',d=>{mpLobbyRooms=d.rooms||[];});
    socket.on('room:update',d=>{if(mpRoom){mpRoom.players=d.players;mpRoom.host=d.host;}});
    socket.on('room:kicked',d=>{alert('You were '+d.reason);mpRoom=null;socket.emit('lobby:list',r=>{mpLobbyRooms=r.rooms||[];});st='lobby';});
    socket.on('room:hostChange',d=>{if(mpRoom)mpRoom.host=d.newHost;});
    socket.on('game:started',d=>{
      mpWave=d.lv;mpGst='playing';mpMode=true;
      ig(); // init player stats, camera, timers
      // Clients simulate zombies locally — clear any ig() may have spawned, wave:zombies arrives separately
      zs=[];bl=[];pu=[];grenWorld=[];
      for(let b of EBLDS){for(let cr of b.crates)cr.taken=false;if(b.medkit)b.medkit.taken=false;}
      _mpLastInvLen=1;mpStateTime=performance.now();mpRemoteBullets=[];
      mpNextWaveComp=d.waveComp||waveComp(1); // what's coming in wave 1
      prepTimer=(d.prepTime||30)*60; // prep phase countdown
      st='prep'; // wave:zombies event will flip this to 'playing'
    });
    socket.on('state',d=>{
      mpPrevPlayers=mpPlayers; // snapshot old positions for interpolation
      mpStateTime=performance.now();
      mpPlayers=d.players||[];
      mpBullets=d.bullets||[];
      mpWave=d.lv;mpGst=d.gst;lv=mpWave;
      // Zombies are now simulated locally — no mpZombieSmooth update needed.
      // Only sync player HP from server (authoritative for zombie attacks)
      if(mpMode){
        let me=d.players.find(p=>p.id===mpMyId);
        if(me){
          // Gently blend server HP toward local HP (server validates zombie damage)
          if(Math.abs(pl.hp-me.hp)>5)pl.hp=me.hp;
          pl.maxHp=me.maxHp;
          mpSyncInventoryToServer();
        }
      }
    });
    // Server sends zombie spawn data at wave start — clients simulate AI locally
    socket.on('wave:zombies',d=>{
      zs=(d.zombies||[]).map(z=>({
        ...z,
        stuckTimer:0,lastX:z.x,lastY:z.y,
        hpBarTimer:0,flashT:0,
        dying:false,dyingVx:0,dyingVy:0,dyingTimer:0,
        charging:z.charging||false,chargeDx:0,chargeDy:0,
        zigzagTimer:z.zigzagTimer||30,zigzagOffset:z.zigzagOffset||0,
        flankTimer:z.flankTimer||60,
      }));
      // Build flow field toward centroid of all alive players (same logic as mpMode ffTimer)
      let _ftx=pl.x,_fty=pl.y,_fn=1;
      for(let p of mpPlayers){if(p.id!==mpMyId&&p.alive){_ftx+=p.x;_fty+=p.y;_fn++;}}
      buildFF(_ftx/_fn,_fty/_fn);
      mpPrepStuck=0; // reset prep-stuck counter
      st='playing'; // transition out of prep phase or wave_clear into playing
    });
    // Another client killed a zombie — remove it from our local simulation
    socket.on('zombie:died',d=>{
      let idx=zs.findIndex(z=>z.id===d.id&&!z.dying);
      if(idx>=0){
        let z=zs[idx];
        addDecal(z.x,z.y,(ZT[z.type||'basic']||ZT.basic).r+8,'#4a0000'); // blood splat (fades like singleplayer)
        z.dying=true;z.dyingVx=(Math.random()-0.5)*6;z.dyingVy=-(Math.random()*3+1);z.dyingTimer=22;
      }
    });
    // Another player fired — simulate their bullet locally at 60fps + show muzzle flash
    socket.on('bullet:fired',d=>{
      mpRemoteBullets.push({x:d.x,y:d.y,vx:d.vx,vy:d.vy,l:d.l||85,
        type:d.wtype||'bullet',wtype:d.wtype,dmg:d.dmg||1,pierce:d.pierce||0,hitCount:0,sz:d.sz||8});
      // Muzzle flash particles at their gun barrel
      let ang=Math.atan2(d.vy,d.vx);
      let mx=d.x+Math.cos(ang)*(PR+8),my=d.y+Math.sin(ang)*(PR+8);
      if(d.wtype==='flame')bst(d.x,d.y,'#ff6600',4,3);
      else bst(mx,my,'#ffffaa',5,2);
    });
    // Another client damaged a zombie — sync HP bar so both players see same health
    socket.on('zombie:damage',d=>{
      let z=zs.find(zz=>zz.id===d.id&&!zz.dying);
      if(!z)return;
      z.hp=Math.max(0,z.hp-d.damage);
      z.flashT=10;z.hpBarTimer=120;
      // Do NOT call killZ — that would credit local player with streak/combo.
      // But DO emit zombie:killed if this cross-client damage finishes the zombie,
      // because neither client's local bullet loop will call killZ in this case.
      // Server deduplicates via killedIds so no double-counting.
      if(z.hp<=0&&!z.dying){
        addDecal(z.x,z.y,(ZT[z.type||'basic']||ZT.basic).r+8,'#4a0000'); // blood splat
        z.dying=true;
        z.dyingVx=(Math.random()-0.5)*8;z.dyingVy=-(Math.random()*3+2);z.dyingTimer=22;
        if(socket)socket.emit('zombie:killed',{id:d.id,type:z.type||'basic'});
      }
    });
    // Host sent authoritative boss position — lerp toward it so both screens match
    socket.on('zombie:pos',d=>{
      let z=zs.find(zz=>zz.id===d.id&&!zz.dying);
      if(!z)return;
      let _dx=d.x-z.x,_dy=d.y-z.y,_dist=Math.hypot(_dx,_dy);
      if(_dist>200){z.x=d.x;z.y=d.y;} // way off — hard snap
      else{let _t=z.type==='boss'?0.35:0.5;z.x+=_dx*_t;z.y+=_dy*_t;}
      if(d.charging!==undefined){
        z.charging=d.charging;
        if(d.charging){z.chargeDx=d.chargeDx;z.chargeDy=d.chargeDy;}
      }
    });
    socket.on('wave:clear',d=>{announce('Wave '+d.lv+' clear!');});
    socket.on('wave:preview',d=>{mpNextWaveComp=d.comp||{};});
    socket.on('wave:start',d=>{mpWave=d.lv;lv=d.lv;announce('Wave '+d.lv);if(st!=='playing')st='playing';});
    socket.on('player:died',()=>{if(mpMode)st='game_over';});
    socket.on('disconnect',()=>{mpMode=false;mpRoom=null;alert('Disconnected from server.');st='menu';});
  }else{

// ── Multiplayer: send inputs each frame ────────────────────────────
let _mpLastInvLen=1;   // track inventory changes to sync to server
let mpStateTime=0;     // performance.now() when last state snapshot arrived
let mpZombieSmooth=new Map(); // id → smoothed zombie object (for 60fps lerp)
function mpSyncInventoryToServer(){
  if(!socket||!mpMode)return;
  if(pl.inventory.length!==_mpLastInvLen){
    _mpLastInvLen=pl.inventory.length;
    // Tell server our current full inventory so it can do server-side shooting correctly
    socket.emit('player:setInventory',{inventory:pl.inventory.map(s=>({w:s.w,ammo:s.ammo===Infinity?-1:s.ammo}))});
  }
}

function mpSendInput(){
  if(!mpMode||!socket)return;
  let ang=Math.atan2((ms.y+cam.y)-pl.y,(ms.x+cam.x)-pl.x);
  socket.emit('input',{
    keys:{w:!!ks['w']||!!ks['W'],a:!!ks['a']||!!ks['A'],s:!!ks['s']||!!ks['S'],d:!!ks['d']||!!ks['D']},
    angle:ang,
    shoot:mouseHeld&&scd===0,
    slot:pl.slot,
    x:pl.x, y:pl.y, // client-authoritative position — server uses this for zombie targeting
  });
}

// ── Multiplayer: keyboard input forwarding ─────────────────────────
C.addEventListener('keydown',e2=>{
  if((st==='lobby'||st==='room_lobby')&&mpInputFocus){
    let k=e2.key;
    if(k==='Backspace'){
      if(mpInputFocus==='name')mpNameInput=mpNameInput.slice(0,-1);
      else if(mpInputFocus==='roomname')mpLobbyNameInput=mpLobbyNameInput.slice(0,-1);
      else if(mpInputFocus==='createpw')mpLobbyPwInput=mpLobbyPwInput.slice(0,-1);
      e2.preventDefault();
    }else if(k==='Escape'){mpInputFocus='';}
    else if(k==='Enter'){
      if(mpInputFocus==='name')mpPlayerName=mpNameInput||mpPlayerName;
      mpInputFocus='';
    }else if(k.length===1){
      if(mpInputFocus==='name'&&mpNameInput.length<16)mpNameInput+=k;
      else if(mpInputFocus==='roomname'&&mpLobbyNameInput.length<28)mpLobbyNameInput+=k;
      else if(mpInputFocus==='createpw'&&mpLobbyPwInput.length<24)mpLobbyPwInput+=k;
      e2.preventDefault();
    }
  }
});

// ── Multiplayer: draw other players (matches singleplayer look) ────
function drawMpPlayers(){
  if(!mpMode)return;
  const charCols=['#2854c8','#c89020','#28a050'];
  const charAccents=['#1ec8ff','#ffdc00','#22ff88'];
  let _t=Math.min((performance.now()-mpStateTime)/33,1); // 0→1 between server ticks
  for(let p of mpPlayers){
    if(p.id===mpMyId||!p.alive)continue;
    // Interpolate position between last two server snapshots for smooth 60fps movement
    let prev=mpPrevPlayers.find(pp=>pp.id===p.id);
    let wx=prev?prev.x+(p.x-prev.x)*_t:p.x;
    let wy=prev?prev.y+(p.y-prev.y)*_t:p.y;
    let px=scx(wx),py=scy(wy);
    let col=charCols[p.char||0]||'#2854c8';
    let acc=charAccents[p.char||0]||'#1ec8ff';
    // Interpolate gun angle between server ticks (handles wrap-around at ±π)
    let ang=typeof p.angle==='number'?p.angle:0;
    if(prev&&typeof prev.angle==='number'){
      let da=ang-prev.angle;
      while(da>Math.PI)da-=Math.PI*2;while(da<-Math.PI)da+=Math.PI*2;
      ang=prev.angle+da*_t;
    }

    // Grounded shadow (matches drawPlayer)
    X.globalAlpha=0.32;X.fillStyle='#000510';
    X.beginPath();X.ellipse(px+3,py+7,PR+8,PR*0.6,0,0,Math.PI*2);X.fill();
    X.globalAlpha=0.14;X.beginPath();X.ellipse(px+3,py+7,PR+13,PR*0.75,0,0,Math.PI*2);X.fill();
    X.globalAlpha=1;

    // Weapon direction indicator (barrel stub)
    let wn=p.inventory&&p.inventory[p.slot||0];
    let wLen=wn&&wn.w==='sniper'?22:wn&&wn.w==='shotgun'?16:18;
    let bx2=px+Math.cos(ang)*(PR+2),by2=py+Math.sin(ang)*(PR+2);
    let ex=px+Math.cos(ang)*(PR+wLen),ey=py+Math.sin(ang)*(PR+wLen);
    X.strokeStyle='rgba(0,0,0,0.55)';X.lineWidth=4;X.lineCap='round';
    X.beginPath();X.moveTo(bx2+1,by2+1);X.lineTo(ex+1,ey+1);X.stroke();
    X.strokeStyle=acc;X.lineWidth=3;
    X.beginPath();X.moveTo(bx2,by2);X.lineTo(ex,ey);X.stroke();

    // Body radial gradient
    let pg=X.createRadialGradient(px-4,py-4,1,px,py,PR);
    pg.addColorStop(0,'#fff');pg.addColorStop(0.25,col);pg.addColorStop(1,'rgba(0,0,0,0.35)');
    X.fillStyle=pg;X.beginPath();X.arc(px,py,PR,0,Math.PI*2);X.fill();
    X.strokeStyle='rgba(0,0,0,0.65)';X.lineWidth=1.5;X.stroke();

    // Rim light (matches drawPlayer)
    X.save();X.beginPath();X.arc(px,py,PR,0,Math.PI*2);X.clip();
    X.strokeStyle=`rgba(255,255,255,0.55)`;X.lineWidth=5;
    X.beginPath();X.arc(px,py,PR+1,Math.PI*1.05,Math.PI*1.72);X.stroke();
    X.restore();

    // Invincibility flash
    if(p.inv){X.globalAlpha=0.38+Math.sin(tk*0.5)*0.25;X.fillStyle=acc;X.beginPath();X.arc(px,py,PR+3,0,Math.PI*2);X.fill();X.globalAlpha=1;}

    // Name tag
    X.fillStyle='rgba(0,0,0,0.6)';
    let ntw=Math.max(48,X.measureText(p.name.slice(0,12)).width+12);
    X.beginPath();if(X.roundRect)X.roundRect(px-ntw/2,py-PR-23,ntw,14,3);else X.rect(px-ntw/2,py-PR-23,ntw,14);X.fill();
    X.fillStyle='#fff';X.font='bold 9px sans-serif';X.textAlign='center';X.textBaseline='middle';
    X.fillText(p.name.slice(0,12),px,py-PR-16);

    // HP bar
    let hfrac=Math.max(0,p.hp/Math.max(1,p.maxHp));
    let hcol=hfrac>0.5?'#22cc44':hfrac>0.25?'#e8a020':'#dd2020';
    rrx(px-18,py+PR+4,36,5,2,'rgba(0,0,0,0.55)');
    if(hfrac>0)rrx(px-18,py+PR+4,36*hfrac,5,2,hcol);
  }
}

loadHS();loadMeta();C.focus();requestAnimationFrame(loop);
</script>
